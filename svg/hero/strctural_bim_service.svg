<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes stA{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes stD{from{stroke-dashoffset:500}to{stroke-dashoffset:0}}
        @keyframes stF{from{opacity:0}to{opacity:1}}
        @keyframes stP{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
        @keyframes stSc{0%{transform:translateY(0);opacity:0}4%{opacity:.12}92%{opacity:.06}100%{transform:translateY(400px);opacity:0}}

        /* Ground floor columns */
        .c1{animation:stA .5s .3s ease both;opacity:0}
        .c2{animation:stA .5s .5s ease both;opacity:0}
        .c3{animation:stA .5s .7s ease both;opacity:0}
        .c4{animation:stA .5s .9s ease both;opacity:0}

        /* Level 1 beams */
        .b1{stroke-dasharray:500;stroke-dashoffset:500;animation:stD .5s 1.2s ease forwards}
        .b2{stroke-dasharray:500;stroke-dashoffset:500;animation:stD .5s 1.5s ease forwards}
        .b3{stroke-dasharray:500;stroke-dashoffset:500;animation:stD .5s 1.8s ease forwards}
        .b4{stroke-dasharray:500;stroke-dashoffset:500;animation:stD .5s 2.0s ease forwards}

        /* Level 1 slab */
        .s1{animation:stF .5s 2.2s ease both;opacity:0}

        /* Level 2 columns */
        .c5{animation:stA .4s 2.5s ease both;opacity:0}
        .c6{animation:stA .4s 2.7s ease both;opacity:0}
        .c7{animation:stA .4s 2.9s ease both;opacity:0}
        .c8{animation:stA .4s 3.1s ease both;opacity:0}

        /* Level 2 beams */
        .b5{stroke-dasharray:500;stroke-dashoffset:500;animation:stD .4s 3.3s ease forwards}
        .b6{stroke-dasharray:500;stroke-dashoffset:500;animation:stD .4s 3.5s ease forwards}
        .b7{stroke-dasharray:500;stroke-dashoffset:500;animation:stD .4s 3.7s ease forwards}
        .b8{stroke-dasharray:500;stroke-dashoffset:500;animation:stD .4s 3.9s ease forwards}

        /* Level 2 slab */
        .s2{animation:stF .5s 4.1s ease both;opacity:0}

        /* Labels + badges */
        .lbl{animation:stF .4s ease both;opacity:0}
        .lb1{animation-delay:2.3s} .lb2{animation-delay:4.2s} .lb3{animation-delay:4.4s}

        .stScan{animation:stSc 7s 1s linear infinite}
      </style>
      <defs>
        <pattern id="stgrid" width="22" height="22" patternUnits="userSpaceOnUse">
          <path d="M22 0L0 0 0 22" fill="none" stroke="rgba(104,125,156,.055)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="420" height="420" fill="url(#stgrid)"/>

      <polygon points="210,340 288,295 210,250 132,295" fill="rgba(104,125,156,.08)" stroke="rgba(74,96,128,.2)" stroke-width=".8"/>

      <g class="c1">
        <line x1="132" y1="295" x2="132" y2="185" stroke="rgba(104,125,156,.85)" stroke-width="5" stroke-linecap="round"/>
        <rect x="125" y="291" width="14" height="8" rx="1" fill="rgba(104,125,156,.6)"/>
      </g>
      <g class="c2">
        <line x1="288" y1="295" x2="288" y2="185" stroke="rgba(104,125,156,.85)" stroke-width="5" stroke-linecap="round"/>
        <rect x="281" y="291" width="14" height="8" rx="1" fill="rgba(104,125,156,.6)"/>
      </g>
      <g class="c3">
        <line x1="210" y1="340" x2="210" y2="230" stroke="rgba(104,125,156,.85)" stroke-width="5" stroke-linecap="round"/>
        <rect x="203" y="336" width="14" height="8" rx="1" fill="rgba(104,125,156,.6)"/>
      </g>
      <g class="c4">
        <line x1="210" y1="250" x2="210" y2="140" stroke="rgba(104,125,156,.6)" stroke-width="4" stroke-linecap="round"/>
        <rect x="203" y="246" width="14" height="8" rx="1" fill="rgba(104,125,156,.45)"/>
      </g>

      <line class="b1" x1="132" y1="185" x2="288" y2="185" stroke="rgba(222,170,87,.9)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="500"/>
      <line class="b2" x1="132" y1="185" x2="210" y2="230" stroke="rgba(222,170,87,.9)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="500"/>
      <line class="b3" x1="288" y1="185" x2="210" y2="140" stroke="rgba(222,170,87,.75)" stroke-width="4" stroke-linecap="round" stroke-dasharray="500"/>
      <line class="b4" x1="132" y1="185" x2="210" y2="140" stroke="rgba(222,170,87,.65)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="500"/>

      <polygon class="s1" points="132,185 288,185 210,140 210,230"
               fill="rgba(104,125,156,.12)" stroke="rgba(74,96,128,.35)" stroke-width=".9"/>

      <g class="s1" opacity=".4">
        <line x1="158" y1="195" x2="236" y2="150" stroke="rgba(74,96,128,.5)" stroke-width=".6"/>
        <line x1="184" y1="204" x2="262" y2="159" stroke="rgba(74,96,128,.5)" stroke-width=".6"/>
        <line x1="210" y1="214" x2="270" y2="178" stroke="rgba(74,96,128,.5)" stroke-width=".6"/>
      </g>

      <g class="lbl lb1">
        <rect x="30" y="178" width="68" height="16" rx="2" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.3)" stroke-width=".8"/>
        <text x="64" y="189" fill="rgba(74,96,128,.72)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">LEVEL 01</text>
        <line x1="98" y1="186" x2="132" y2="186" stroke="rgba(104,125,156,.35)" stroke-width=".7" stroke-dasharray="3 2"/>
      </g>

      <g class="c5">
        <line x1="132" y1="185" x2="132" y2="98" stroke="rgba(104,125,156,.8)" stroke-width="5" stroke-linecap="round"/>
      </g>
      <g class="c6">
        <line x1="288" y1="185" x2="288" y2="98" stroke="rgba(104,125,156,.8)" stroke-width="5" stroke-linecap="round"/>
      </g>
      <g class="c7">
        <line x1="210" y1="230" x2="210" y2="143" stroke="rgba(104,125,156,.8)" stroke-width="5" stroke-linecap="round"/>
      </g>
      <g class="c8">
        <line x1="210" y1="140" x2="210" y2="53" stroke="rgba(104,125,156,.55)" stroke-width="4" stroke-linecap="round"/>
      </g>

      <line class="b5" x1="132" y1="98" x2="288" y2="98" stroke="rgba(222,170,87,.88)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="500"/>
      <line class="b6" x1="132" y1="98" x2="210" y2="143" stroke="rgba(222,170,87,.88)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="500"/>
      <line class="b7" x1="288" y1="98" x2="210" y2="53" stroke="rgba(222,170,87,.72)" stroke-width="4" stroke-linecap="round" stroke-dasharray="500"/>
      <line class="b8" x1="132" y1="98" x2="210" y2="53" stroke="rgba(222,170,87,.62)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="500"/>

      <polygon class="s2" points="132,98 288,98 210,53 210,143"
               fill="rgba(104,125,156,.14)" stroke="rgba(74,96,128,.38)" stroke-width=".9"/>
      <g class="s2" opacity=".38">
        <line x1="158" y1="108" x2="236" y2="63" stroke="rgba(74,96,128,.5)" stroke-width=".6"/>
        <line x1="184" y1="117" x2="262" y2="72" stroke="rgba(74,96,128,.5)" stroke-width=".6"/>
        <line x1="210" y1="127" x2="270" y2="91" stroke="rgba(74,96,128,.5)" stroke-width=".6"/>
      </g>
      <g class="lbl lb2">
        <rect x="30" y="91" width="68" height="16" rx="2" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.3)" stroke-width=".8"/>
        <text x="64" y="102" fill="rgba(74,96,128,.72)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">LEVEL 02</text>
        <line x1="98" y1="99" x2="132" y2="99" stroke="rgba(104,125,156,.35)" stroke-width=".7" stroke-dasharray="3 2"/>
      </g>
      <g class="lbl lb3">
        <rect x="290" y="310" width="118" height="74" rx="4" fill="rgba(250,249,247,.95)" stroke="rgba(104,125,156,.22)" stroke-width=".8"/>
        <line x1="302" y1="330" x2="322" y2="330" stroke="rgba(104,125,156,.85)" stroke-width="4" stroke-linecap="round"/>
        <text x="330" y="334" fill="rgba(74,96,128,.7)" font-family="monospace" font-size="7.5" font-weight="bold">Steel Columns</text>
        <line x1="302" y1="348" x2="322" y2="348" stroke="rgba(222,170,87,.9)" stroke-width="4" stroke-linecap="round"/>
        <text x="330" y="352" fill="rgba(74,96,128,.7)" font-family="monospace" font-size="7.5" font-weight="bold">Steel Beams</text>
        <rect x="302" y="360" width="20" height="10" rx="1" fill="rgba(104,125,156,.18)" stroke="rgba(74,96,128,.3)" stroke-width=".7"/>
        <text x="330" y="369" fill="rgba(74,96,128,.7)" font-family="monospace" font-size="7.5" font-weight="bold">Concrete Slabs</text>
        <text x="349" y="377" fill="rgba(222,170,87,.65)" font-family="monospace" font-size="6.5" text-anchor="middle" font-weight="bold">EAGLE BIM · eaglebim.com</text>
      </g>
      <g class="lbl lb3" opacity=".6">
        <line x1="112" y1="295" x2="112" y2="98" stroke="rgba(74,96,128,.45)" stroke-width=".8"/>
        <line x1="107" y1="295" x2="117" y2="295" stroke="rgba(74,96,128,.45)" stroke-width=".8"/>
        <line x1="107" y1="98" x2="117" y2="98" stroke="rgba(74,96,128,.45)" stroke-width=".8"/>
        <rect x="82" y="185" width="30" height="14" rx="1" fill="rgba(250,249,247,.9)" stroke="rgba(74,96,128,.2)" stroke-width=".5"/>
        <text x="97" y="195" fill="rgba(74,96,128,.8)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold" transform="rotate(-90,97,195)">8.0m</text>
      </g>
      <g class="lbl lb3">
        <rect x="310" y="252" width="90" height="44" rx="4" fill="rgba(104,125,156,.08)" stroke="rgba(104,125,156,.22)" stroke-width=".8"/>
        <text x="355" y="270" fill="rgba(74,96,128,.68)" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold">REVIT LOD 350</text>
        <text x="355" y="283" fill="rgba(104,125,156,.48)" font-family="monospace" font-size="7" text-anchor="middle">Structural BIM Model</text>
        <text x="355" y="292" fill="rgba(104,125,156,.4)" font-family="monospace" font-size="6.5" text-anchor="middle">Ready for Coordination</text>
      </g>
      <rect x="0" y="0" width="420" height="1.5" fill="rgba(104,125,156,.12)" class="stScan"/>
    </svg>