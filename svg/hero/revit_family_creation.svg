<svg width="420" height="460" viewBox="0 0 420 460" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes rfAppear{from{opacity:0}to{opacity:1}}
        @keyframes rfDraw{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
        @keyframes rfSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
        @keyframes rfPop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
        @keyframes rfBlink{0%,100%{opacity:1}50%{opacity:0}}
        @keyframes rfScan{0%{transform:translateY(0);opacity:0}4%{opacity:.2}92%{opacity:.1}100%{transform:translateY(420px);opacity:0}}
        @keyframes rfDim{from{stroke-dashoffset:300;opacity:0}to{stroke-dashoffset:0;opacity:1}}

        .rf-chrome{animation:rfAppear .4s .1s ease both;opacity:0}
        .rf-grid{animation:rfAppear .4s .5s ease both;opacity:0}
        .rf-geom{stroke-dasharray:600;stroke-dashoffset:600;animation:rfDraw ease forwards}
        .rf-g1{animation-duration:.8s;animation-delay:.7s}
        .rf-g2{animation-duration:.6s;animation-delay:1.1s}
        .rf-g3{animation-duration:.5s;animation-delay:1.5s}
        .rf-g4{animation-duration:.4s;animation-delay:1.8s}
        .rf-dim{animation:rfDim .4s ease both;opacity:0}
        .rf-d1{animation-delay:2.0s}.rf-d2{animation-delay:2.2s}.rf-d3{animation-delay:2.4s}
        .rf-param{animation:rfSlide .35s ease both;opacity:0}
        .rf-p1{animation-delay:2.1s}.rf-p2{animation-delay:2.3s}.rf-p3{animation-delay:2.5s}
        .rf-p4{animation-delay:2.7s}.rf-p5{animation-delay:2.9s}
        .rf-tag{animation:rfPop .3s ease both;opacity:0}
        .rf-t1{animation-delay:2.6s}.rf-t2{animation-delay:2.8s}.rf-t3{animation-delay:3.0s}
        .rf-badge{animation:rfPop .4s 3.2s ease both;opacity:0}
        .rf-cur{animation:rfBlink .9s .8s step-end infinite}
        .rf-scan{animation:rfScan 6s 1s linear infinite}
      </style>
      <defs>
        <pattern id="rfgrid" width="16" height="16" patternUnits="userSpaceOnUse">
          <path d="M16 0L0 0 0 16" fill="none" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="420" height="460" fill="url(#rfgrid)"/>

      <!-- ── FAMILY EDITOR CHROME ── -->
      <g class="rf-chrome">
        <!-- Window -->
        <rect x="18" y="16" width="384" height="428" rx="3" fill="rgba(248,247,246,.97)" stroke="rgba(74,96,128,.5)" stroke-width="1.2"/>
        <!-- Title bar -->
        <rect x="18" y="16" width="384" height="26" fill="rgba(74,96,128,.85)" rx="3"/>
        <rect x="18" y="30" width="384" height="12" fill="rgba(74,96,128,.85)"/>
        <text x="32" y="33" fill="rgba(255,255,255,.85)" font-family="monospace" font-size="8.5" font-weight="bold" letter-spacing=".06em">REVIT FAMILY EDITOR  —  Generic Model.rfa</text>
        <!-- Traffic lights -->
        <circle cx="382" cy="29" r="4.5" fill="rgba(255,90,90,.75)"/>
        <circle cx="395" cy="29" r="4.5" fill="rgba(255,200,50,.55)"/>
        <!-- Toolbar -->
        <rect x="18" y="42" width="384" height="18" fill="rgba(245,244,242,1)" stroke="rgba(200,206,215,.6)" stroke-width=".6"/>
        <text x="28" y="54" fill="rgba(100,110,130,.55)" font-family="monospace" font-size="6.5">Reference Plane  |  Extrusion  |  Void  |  Align  |  Lock  |  Parameter  |  Family Types</text>
        <!-- Blinking cursor -->
        <rect class="rf-cur" x="386" y="46" width="1.5" height="10" fill="rgba(74,96,128,.7)"/>
      </g>

      <!-- ── DRAWING CANVAS (left 60%) ── -->
      <!-- Canvas bg -->
      <rect x="18" y="60" width="242" height="328" fill="rgba(255,255,255,.9)" stroke="rgba(200,206,215,.4)" stroke-width=".6"/>

      <!-- Grid dots on canvas -->
      <g class="rf-grid">
        <pattern id="dotgrid" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r=".8" fill="rgba(104,125,156,.18)"/>
        </pattern>
        <rect x="18" y="60" width="242" height="328" fill="url(#dotgrid)"/>
        <!-- Reference planes (pink dashed lines) -->
        <line x1="139" y1="60" x2="139" y2="388" stroke="rgba(220,100,100,.5)" stroke-width=".8" stroke-dasharray="5 4"/>
        <line x1="18" y1="224" x2="260" y2="224" stroke="rgba(220,100,100,.5)" stroke-width=".8" stroke-dasharray="5 4"/>
        <!-- Ref plane labels -->
        <text x="141" y="72" fill="rgba(220,100,100,.7)" font-family="monospace" font-size="6.5">Center (L/R)</text>
        <text x="22" y="221" fill="rgba(220,100,100,.7)" font-family="monospace" font-size="6.5">Center (F/B)</text>
      </g>

      <!-- ── PARAMETRIC COMPONENT GEOMETRY ── -->
      <!-- Main body — door panel -->
      <rect class="rf-geom rf-g1" x="89" y="134" width="100" height="160"
            fill="rgba(104,125,156,.08)" stroke="rgba(26,34,51,.7)" stroke-width="2"
            stroke-dasharray="600"/>
      <!-- Door frame -->
      <rect class="rf-geom rf-g2" x="83" y="128" width="112" height="6"
            fill="rgba(104,125,156,.12)" stroke="rgba(26,34,51,.55)" stroke-width="1.5"
            stroke-dasharray="600"/>
      <rect class="rf-geom rf-g2" x="83" y="134" width="6" height="160"
            fill="rgba(104,125,156,.12)" stroke="rgba(26,34,51,.55)" stroke-width="1.5"
            stroke-dasharray="600"/>
      <rect class="rf-geom rf-g2" x="189" y="134" width="6" height="160"
            fill="rgba(104,125,156,.12)" stroke="rgba(26,34,51,.55)" stroke-width="1.5"
            stroke-dasharray="600"/>
      <!-- Door swing arc -->
      <path class="rf-geom rf-g3" d="M89,294 Q89,214 169,214"
            fill="none" stroke="rgba(104,125,156,.45)" stroke-width="1.2"
            stroke-dasharray="4 3" stroke-dashoffset="0"/>
      <!-- Handle -->
      <circle class="rf-geom rf-g4" cx="178" cy="218" r="4"
              fill="rgba(222,170,87,.8)" stroke="rgba(180,130,40,.7)" stroke-width="1"
              stroke-dasharray="600"/>
      <line class="rf-geom rf-g4" x1="178" y1="222" x2="178" y2="234"
            stroke="rgba(180,130,40,.7)" stroke-width="1.5" stroke-dasharray="600"/>

      <!-- ── CONSTRAINT / EQUALITY SYMBOLS ── -->
      <g class="rf-tag rf-t1">
        <!-- Width constraint lock -->
        <rect x="114" y="115" width="50" height="11" rx="2" fill="rgba(74,96,128,.1)" stroke="rgba(74,96,128,.4)" stroke-width=".8"/>
        <text x="139" y="123" fill="rgba(74,96,128,.85)" font-family="monospace" font-size="6.5" text-anchor="middle" font-weight="bold">= Width</text>
      </g>
      <g class="rf-tag rf-t2">
        <rect x="66" y="198" width="14" height="14" rx="2" fill="rgba(222,170,87,.15)" stroke="rgba(222,170,87,.6)" stroke-width=".8"/>
        <text x="73" y="208" fill="rgba(180,130,40,.9)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">=</text>
      </g>
      <g class="rf-tag rf-t3">
        <rect x="193" y="198" width="14" height="14" rx="2" fill="rgba(222,170,87,.15)" stroke="rgba(222,170,87,.6)" stroke-width=".8"/>
        <text x="200" y="208" fill="rgba(180,130,40,.9)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">=</text>
      </g>

      <!-- ── DIMENSION STRINGS ── -->
      <!-- Width dim -->
      <g class="rf-dim rf-d1">
        <line x1="83" y1="312" x2="195" y2="312" stroke="rgba(74,96,128,.65)" stroke-width=".9"/>
        <line x1="83" y1="307" x2="83" y2="317" stroke="rgba(74,96,128,.65)" stroke-width=".9"/>
        <line x1="195" y1="307" x2="195" y2="317" stroke="rgba(74,96,128,.65)" stroke-width=".9"/>
        <rect x="110" y="316" width="58" height="12" rx="1" fill="rgba(255,255,255,.95)" stroke="rgba(74,96,128,.3)" stroke-width=".6"/>
        <text x="139" y="325" fill="rgba(74,96,128,.9)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">Width = 900</text>
      </g>
      <!-- Height dim -->
      <g class="rf-dim rf-d2">
        <line x1="32" y1="128" x2="32" y2="294" stroke="rgba(74,96,128,.65)" stroke-width=".9"/>
        <line x1="27" y1="128" x2="37" y2="128" stroke="rgba(74,96,128,.65)" stroke-width=".9"/>
        <line x1="27" y1="294" x2="37" y2="294" stroke="rgba(74,96,128,.65)" stroke-width=".9"/>
        <rect x="37" y="200" width="62" height="12" rx="1" fill="rgba(255,255,255,.95)" stroke="rgba(74,96,128,.3)" stroke-width=".6"/>
        <text x="68" y="209" fill="rgba(74,96,128,.9)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">Height = 2100</text>
      </g>
      <!-- Thickness dim -->
      <g class="rf-dim rf-d3">
        <line x1="83" y1="348" x2="89" y2="348" stroke="rgba(74,96,128,.55)" stroke-width=".8"/>
        <line x1="83" y1="344" x2="83" y2="352" stroke="rgba(74,96,128,.55)" stroke-width=".8"/>
        <line x1="89" y1="344" x2="89" y2="352" stroke="rgba(74,96,128,.55)" stroke-width=".8"/>
        <rect x="57" y="351" width="64" height="11" rx="1" fill="rgba(255,255,255,.95)" stroke="rgba(74,96,128,.25)" stroke-width=".6"/>
        <text x="89" y="359" fill="rgba(74,96,128,.75)" font-family="monospace" font-size="6.5" text-anchor="middle">Thickness = 50</text>
      </g>

      <!-- ── PARAMETER PANEL (right 40%) ── -->
      <rect x="260" y="60" width="142" height="328" fill="rgba(244,243,241,.98)" stroke="rgba(200,206,215,.5)" stroke-width=".8"/>
      <!-- Panel header -->
      <rect x="260" y="60" width="142" height="20" fill="rgba(74,96,128,.12)"/>
      <text x="268" y="73" fill="rgba(74,96,128,.8)" font-family="monospace" font-size="7.5" font-weight="bold" letter-spacing=".05em">FAMILY PARAMETERS</text>
      <!-- Column headers -->
      <text x="268" y="91" fill="rgba(104,125,156,.5)" font-family="monospace" font-size="6.5" font-weight="bold">NAME</text>
      <text x="350" y="91" fill="rgba(104,125,156,.5)" font-family="monospace" font-size="6.5" font-weight="bold">VALUE</text>
      <line x1="260" y1="94" x2="402" y2="94" stroke="rgba(200,206,215,.6)" stroke-width=".6"/>

      <!-- Parameter rows -->
      <g class="rf-param rf-p1">
        <rect x="260" y="94" width="142" height="20" fill="rgba(104,125,156,.04)"/>
        <text x="268" y="107" fill="rgba(26,34,51,.75)" font-family="monospace" font-size="7">Width</text>
        <text x="350" y="107" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="7" font-weight="bold">900 mm</text>
        <line x1="260" y1="114" x2="402" y2="114" stroke="rgba(200,206,215,.4)" stroke-width=".5"/>
      </g>
      <g class="rf-param rf-p2">
        <text x="268" y="127" fill="rgba(26,34,51,.75)" font-family="monospace" font-size="7">Height</text>
        <text x="350" y="127" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="7" font-weight="bold">2100 mm</text>
        <line x1="260" y1="130" x2="402" y2="130" stroke="rgba(200,206,215,.4)" stroke-width=".5"/>
      </g>
      <g class="rf-param rf-p3">
        <rect x="260" y="130" width="142" height="20" fill="rgba(104,125,156,.04)"/>
        <text x="268" y="143" fill="rgba(26,34,51,.75)" font-family="monospace" font-size="7">Thickness</text>
        <text x="350" y="143" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="7" font-weight="bold">50 mm</text>
        <line x1="260" y1="150" x2="402" y2="150" stroke="rgba(200,206,215,.4)" stroke-width=".5"/>
      </g>
      <g class="rf-param rf-p4">
        <text x="268" y="163" fill="rgba(26,34,51,.75)" font-family="monospace" font-size="7">Frame Width</text>
        <text x="350" y="163" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="7" font-weight="bold">60 mm</text>
        <line x1="260" y1="166" x2="402" y2="166" stroke="rgba(200,206,215,.4)" stroke-width=".5"/>
      </g>
      <g class="rf-param rf-p5">
        <rect x="260" y="166" width="142" height="20" fill="rgba(104,125,156,.04)"/>
        <text x="268" y="179" fill="rgba(26,34,51,.75)" font-family="monospace" font-size="7">Material</text>
        <text x="350" y="179" fill="rgba(74,96,128,.7)" font-family="monospace" font-size="6.5">Timber</text>
        <line x1="260" y1="186" x2="402" y2="186" stroke="rgba(200,206,215,.4)" stroke-width=".5"/>
      </g>

      <!-- More params faded -->
      <g opacity=".35">
        <text x="268" y="199" fill="rgba(26,34,51,.6)" font-family="monospace" font-size="7">Fire Rating</text>
        <text x="350" y="199" fill="rgba(104,125,156,.7)" font-family="monospace" font-size="6.5">FD30</text>
        <line x1="260" y1="202" x2="402" y2="202" stroke="rgba(200,206,215,.4)" stroke-width=".5"/>
        <text x="268" y="215" fill="rgba(26,34,51,.6)" font-family="monospace" font-size="7">Handle Side</text>
        <text x="350" y="215" fill="rgba(104,125,156,.7)" font-family="monospace" font-size="6.5">Right</text>
        <line x1="260" y1="218" x2="402" y2="218" stroke="rgba(200,206,215,.4)" stroke-width=".5"/>
        <text x="268" y="231" fill="rgba(26,34,51,.6)" font-family="monospace" font-size="7">Swing Angle</text>
        <text x="350" y="231" fill="rgba(104,125,156,.7)" font-family="monospace" font-size="6.5">90°</text>
      </g>

      <!-- Type selector -->
      <rect x="260" y="255" width="142" height="18" fill="rgba(74,96,128,.08)" stroke="rgba(74,96,128,.2)" stroke-width=".6"/>
      <text x="268" y="267" fill="rgba(74,96,128,.65)" font-family="monospace" font-size="6.5" font-weight="bold">FAMILY TYPES</text>
      <g opacity=".65">
        <rect x="260" y="274" width="142" height="14" fill="rgba(104,125,156,.08)"/>
        <text x="268" y="284" fill="rgba(26,34,51,.7)" font-family="monospace" font-size="6.5">Single Door 900×2100</text>
        <text x="380" y="284" fill="rgba(104,125,156,.6)" font-family="monospace" font-size="6" text-anchor="end">✓</text>
      </g>
      <text x="268" y="300" fill="rgba(26,34,51,.45)" font-family="monospace" font-size="6.5">Single Door 800×2100</text>
      <text x="268" y="312" fill="rgba(26,34,51,.45)" font-family="monospace" font-size="6.5">Single Door 1000×2100</text>
      <text x="268" y="324" fill="rgba(26,34,51,.45)" font-family="monospace" font-size="6.5">Double Door 1800×2100</text>

      <!-- Status bar -->
      <g class="rf-chrome">
        <rect x="18" y="388" width="384" height="18" fill="rgba(74,96,128,.08)" stroke="rgba(200,206,215,.4)" stroke-width=".5"/>
        <text x="26" y="399" fill="rgba(104,125,156,.55)" font-family="monospace" font-size="6.5">Family: Generic Model  |  Category: Doors  |  Parameters: 9 Instance · 3 Type  |  Types: 4</text>
      </g>

      <!-- ── TESTED BADGE ── -->
      <g class="rf-badge">
        <rect x="260" y="345" width="142" height="38" rx="4" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.3)" stroke-width=".8"/>
        <text x="331" y="360" fill="rgba(74,96,128,.75)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">TESTED IN REVIT</text>
        <text x="331" y="374" fill="rgba(104,125,156,.5)" font-family="monospace" font-size="6.5" text-anchor="middle">Eagle BIM · Revit Family Creation</text>
      </g>

      <!-- Scan -->
      <rect x="18" y="16" width="384" height="1.5" fill="rgba(104,125,156,.18)" class="rf-scan"/>
    </svg>