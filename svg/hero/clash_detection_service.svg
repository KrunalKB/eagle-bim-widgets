<svg width="440" height="480" viewBox="0 0 440 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-sm"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <style>
        @keyframes nvAppear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes clashBlink{0%,100%{opacity:1;r:6}50%{opacity:.3;r:9}}
        @keyframes clashBlink2{0%,100%{opacity:.8;r:4}50%{opacity:.2;r:7}}
        @keyframes rowSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
        @keyframes countUp{from{opacity:0}to{opacity:1}}
        @keyframes scanLine{0%{transform:translateY(0);opacity:0}5%{opacity:.35}93%{opacity:.2}100%{transform:translateY(400px);opacity:0}}
        @keyframes resolvedPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
        @keyframes barGrow{from{width:0}to{width:var(--w)}}

        .nv-ui{animation:nvAppear .6s .1s ease both;opacity:0}
        .nv-model{animation:nvAppear .6s .3s ease both;opacity:0}
        .cd1{animation:clashBlink 1.6s 1s ease-in-out infinite}
        .cd2{animation:clashBlink2 1.6s 1.3s ease-in-out infinite}
        .cd3{animation:clashBlink 1.6s 1.6s ease-in-out infinite}
        .cd4{animation:clashBlink2 1.4s 1.9s ease-in-out infinite}
        .r1{animation:rowSlide .4s 1.2s ease both;opacity:0}
        .r2{animation:rowSlide .4s 1.5s ease both;opacity:0}
        .r3{animation:rowSlide .4s 1.8s ease both;opacity:0}
        .r4{animation:rowSlide .4s 2.1s ease both;opacity:0}
        .r5{animation:rowSlide .4s 2.4s ease both;opacity:0}
        .resolved-badge{animation:resolvedPop .5s 2.6s ease both;opacity:0}
        .scan{animation:scanLine 5s 1.5s linear infinite}
        .bar-fill{animation:barGrow 1s 1.5s ease both}
      </style>

      <!-- BG -->
      <defs><pattern id="pg2" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/></pattern></defs>
      <rect width="440" height="480" fill="url(#pg2)"/>

      <!-- ── NAVISWORKS UI CHROME ── -->
      <g class="nv-ui">
        <!-- Main window -->
        <rect x="18" y="60" width="404" height="390" rx="4" fill="rgba(26,34,51,.96)" stroke="rgba(104,125,156,.3)" stroke-width="1"/>
        <!-- Title bar -->
        <rect x="18" y="60" width="404" height="26" rx="4" fill="rgba(74,96,128,.8)"/>
        <rect x="18" y="74" width="404" height="12" fill="rgba(74,96,128,.8)"/>
        <text x="30" y="77" fill="rgba(255,255,255,.8)" font-family="monospace" font-size="8" font-weight="bold">NAVISWORKS MANAGE  —  CLASH DETECTIVE</text>
        <!-- Traffic lights -->
        <circle cx="392" cy="73" r="4" fill="rgba(255,100,100,.7)"/>
        <circle cx="404" cy="73" r="4" fill="rgba(255,200,50,.5)"/>
        <circle cx="416" cy="73" r="4" fill="rgba(80,200,80,.5)"/>

        <!-- Toolbar row -->
        <rect x="18" y="86" width="404" height="18" fill="rgba(255,255,255,.04)"/>
        <text x="28" y="98" fill="rgba(255,255,255,.35)" font-family="monospace" font-size="7">Run All  |  Reset  |  Export  |  Filter  |  Settings</text>
      </g>

      <!-- ── 3D VIEWPORT (left) ── -->
      <g class="nv-model">
        <!-- viewport bg -->
        <rect x="22" y="108" width="200" height="200" fill="rgba(15,22,40,.8)" rx="2"/>
        <text x="32" y="120" fill="rgba(255,255,255,.25)" font-family="monospace" font-size="7">3D VIEW — FEDERATED MODEL</text>

        <!-- Architectural box (blue wireframe) -->
        <polygon points="50,190 110,155 170,190 110,225" fill="rgba(104,125,156,.08)" stroke="rgba(104,125,156,.5)" stroke-width=".8"/>
        <polygon points="50,190 50,160 110,125 110,155" fill="rgba(104,125,156,.12)" stroke="rgba(104,125,156,.5)" stroke-width=".8"/>
        <polygon points="110,155 170,120 170,190 110,225" fill="rgba(104,125,156,.06)" stroke="rgba(104,125,156,.4)" stroke-width=".8"/>
        <polygon points="50,160 110,125 170,120 170,90 110,95 50,130" fill="rgba(104,125,156,.15)" stroke="rgba(104,125,156,.5)" stroke-width=".8"/>

        <!-- MEP duct (gold) cutting through -->
        <rect x="45" y="158" width="138" height="10" fill="rgba(222,170,87,.15)" stroke="rgba(222,170,87,.7)" stroke-width=".8" rx="1"/>
        <!-- Pipe (lighter) -->
        <line x1="45" y1="178" x2="183" y2="178" stroke="rgba(222,170,87,.5)" stroke-width="3" stroke-linecap="round"/>

        <!-- CLASH DOTS — red pulsing at intersections -->
        <circle class="cd1" cx="82" cy="163" r="6" fill="rgba(224,85,85,.9)" filter="url(#glow)" stroke="rgba(255,150,150,.4)" stroke-width="1"/>
        <circle class="cd2" cx="130" cy="163" r="4" fill="rgba(224,85,85,.8)" filter="url(#glow-sm)"/>
        <circle class="cd3" cx="158" cy="178" r="6" fill="rgba(224,85,85,.9)" filter="url(#glow)"/>
        <circle class="cd4" cx="65" cy="178" r="4" fill="rgba(224,85,85,.7)" filter="url(#glow-sm)"/>

        <!-- Clash ID tags -->
        <rect x="70" y="148" width="24" height="10" rx="2" fill="rgba(224,85,85,.8)"/>
        <text x="82" y="156" fill="white" font-family="monospace" font-size="6.5" text-anchor="middle" font-weight="bold">C-01</text>
        <rect x="146" y="165" width="24" height="10" rx="2" fill="rgba(224,85,85,.8)"/>
        <text x="158" y="173" fill="white" font-family="monospace" font-size="6.5" text-anchor="middle" font-weight="bold">C-03</text>

        <!-- Viewport stats -->
        <text x="28" y="296" fill="rgba(255,255,255,.25)" font-family="monospace" font-size="6.5">Active clashes: 4  |  Model: Federated NWD</text>
      </g>

      <!-- ── CLASH REPORT PANEL (right) ── -->
      <g>
        <rect x="228" y="108" width="190" height="200" fill="rgba(255,255,255,.03)" rx="2"/>
        <!-- Panel header -->
        <rect x="228" y="108" width="190" height="20" fill="rgba(74,96,128,.4)"/>
        <text x="236" y="121" fill="rgba(255,255,255,.7)" font-family="monospace" font-size="7" font-weight="bold">CLASH REPORT</text>
        <text x="400" y="121" fill="rgba(255,255,255,.4)" font-family="monospace" font-size="7" text-anchor="end">47 total</text>

        <!-- Column headers -->
        <text x="234" y="137" fill="rgba(255,255,255,.3)" font-family="monospace" font-size="6">ID</text>
        <text x="254" y="137" fill="rgba(255,255,255,.3)" font-family="monospace" font-size="6">TYPE</text>
        <text x="292" y="137" fill="rgba(255,255,255,.3)" font-family="monospace" font-size="6">ELEMENTS</text>
        <text x="378" y="137" fill="rgba(255,255,255,.3)" font-family="monospace" font-size="6">STATUS</text>
        <line x1="228" y1="140" x2="418" y2="140" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>

        <!-- Clash rows -->
        <g class="r1">
          <rect x="228" y="141" width="190" height="14" fill="rgba(224,85,85,.08)"/>
          <text x="234" y="151" fill="rgba(255,100,100,.9)" font-family="monospace" font-size="6.5" font-weight="bold">C-01</text>
          <text x="254" y="151" fill="rgba(255,100,100,.7)" font-family="monospace" font-size="6">HARD</text>
          <text x="292" y="151" fill="rgba(255,255,255,.5)" font-family="monospace" font-size="6">Duct vs Beam</text>
          <rect x="374" y="144" width="36" height="9" rx="2" fill="rgba(255,180,0,.2)" stroke="rgba(255,180,0,.4)" stroke-width=".5"/>
          <text x="392" y="151" fill="rgba(255,200,50,.9)" font-family="monospace" font-size="6" text-anchor="middle">OPEN</text>
        </g>
        <g class="r2">
          <text x="234" y="165" fill="rgba(255,100,100,.9)" font-family="monospace" font-size="6.5" font-weight="bold">C-02</text>
          <text x="254" y="165" fill="rgba(255,100,100,.7)" font-family="monospace" font-size="6">HARD</text>
          <text x="292" y="165" fill="rgba(255,255,255,.5)" font-family="monospace" font-size="6">Pipe vs Column</text>
          <rect x="370" y="158" width="44" height="9" rx="2" fill="rgba(104,125,156,.2)" stroke="rgba(104,125,156,.4)" stroke-width=".5"/>
          <text x="392" y="165" fill="rgba(150,180,220,.9)" font-family="monospace" font-size="6" text-anchor="middle">RESOLVED</text>
        </g>
        <g class="r3">
          <text x="234" y="179" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="6.5" font-weight="bold">C-03</text>
          <text x="254" y="179" fill="rgba(222,170,87,.7)" font-family="monospace" font-size="6">SOFT</text>
          <text x="292" y="179" fill="rgba(255,255,255,.5)" font-family="monospace" font-size="6">MEP clearance</text>
          <rect x="366" y="172" width="48" height="9" rx="2" fill="rgba(200,148,61,.15)" stroke="rgba(200,148,61,.4)" stroke-width=".5"/>
          <text x="390" y="179" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="6" text-anchor="middle">IN REVIEW</text>
        </g>
        <g class="r4">
          <text x="234" y="193" fill="rgba(255,100,100,.9)" font-family="monospace" font-size="6.5" font-weight="bold">C-04</text>
          <text x="254" y="193" fill="rgba(255,100,100,.7)" font-family="monospace" font-size="6">HARD</text>
          <text x="292" y="193" fill="rgba(255,255,255,.5)" font-family="monospace" font-size="6">Conduit vs Slab</text>
          <rect x="370" y="186" width="44" height="9" rx="2" fill="rgba(104,125,156,.2)" stroke="rgba(104,125,156,.4)" stroke-width=".5"/>
          <text x="392" y="193" fill="rgba(150,180,220,.9)" font-family="monospace" font-size="6" text-anchor="middle">RESOLVED</text>
        </g>
        <g class="r5">
          <text x="234" y="207" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="6.5" font-weight="bold">C-05</text>
          <text x="254" y="207" fill="rgba(222,170,87,.7)" font-family="monospace" font-size="6">SOFT</text>
          <text x="292" y="207" fill="rgba(255,255,255,.5)" font-family="monospace" font-size="6">RCP zone conflict</text>
          <rect x="366" y="200" width="48" height="9" rx="2" fill="rgba(200,148,61,.15)" stroke="rgba(200,148,61,.4)" stroke-width=".5"/>
          <text x="390" y="207" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="6" text-anchor="middle">IN REVIEW</text>
        </g>
        <line x1="228" y1="213" x2="418" y2="213" stroke="rgba(255,255,255,.06)" stroke-width=".5"/>
        <text x="234" y="222" fill="rgba(255,255,255,.2)" font-family="monospace" font-size="6">... 42 more clashes below</text>
      </g>

      <!-- ── SUMMARY BAR ── -->
      <g class="nv-ui">
        <rect x="22" y="316" width="396" height="72" fill="rgba(255,255,255,.03)" rx="2"/>
        <text x="30" y="330" fill="rgba(255,255,255,.4)" font-family="monospace" font-size="7" font-weight="bold" letter-spacing=".06em">CLASH SUMMARY</text>

        <!-- Hard clashes bar -->
        <text x="30" y="345" fill="rgba(255,100,100,.8)" font-family="monospace" font-size="6.5">Hard</text>
        <rect x="60" y="337" width="240" height="8" rx="2" fill="rgba(255,255,255,.06)"/>
        <rect x="60" y="337" height="8" rx="2" fill="rgba(224,85,85,.7)" class="bar-fill" style="--w:168px;width:168px"/>
        <text x="308" y="345" fill="rgba(255,100,100,.7)" font-family="monospace" font-size="6.5">31</text>

        <!-- Soft clashes bar -->
        <text x="30" y="360" fill="rgba(222,170,87,.8)" font-family="monospace" font-size="6.5">Soft</text>
        <rect x="60" y="352" width="240" height="8" rx="2" fill="rgba(255,255,255,.06)"/>
        <rect x="60" y="352" height="8" rx="2" fill="rgba(222,170,87,.6)" class="bar-fill" style="--w:87px;width:87px"/>
        <text x="308" y="360" fill="rgba(222,170,87,.7)" font-family="monospace" font-size="6.5">16</text>

        <!-- Resolved / open counts -->
        <text x="340" y="345" fill="rgba(150,180,220,.6)" font-family="monospace" font-size="6.5">Resolved: 39</text>
        <text x="340" y="360" fill="rgba(255,180,0,.6)" font-family="monospace" font-size="6.5">Open: 8</text>
      </g>

      <!-- ── FOOTER BAR ── -->
      <g class="nv-ui">
        <rect x="18" y="396" width="404" height="54" fill="rgba(255,255,255,.02)" rx="2"/>
        <line x1="18" y1="396" x2="422" y2="396" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
        <text x="30" y="412" fill="rgba(255,255,255,.25)" font-family="monospace" font-size="7">Models: ARCH · STRUCT · MEP · CIVIL  |  Format: NWD  |  Disciplines: 4</text>
        <text x="30" y="428" fill="rgba(255,255,255,.2)" font-family="monospace" font-size="7">Deliverables: Clash Report PDF · NWD · XLSX · Coordination Drawings</text>
        <!-- Resolved badge -->
        <g class="resolved-badge">
          <rect x="320" y="405" width="88" height="34" rx="4" fill="rgba(80,180,100,.15)" stroke="rgba(80,200,100,.35)" stroke-width="1"/>
          <text x="364" y="418" fill="rgba(100,220,120,.9)" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">✓ CLASH-FREE</text>
          <text x="364" y="430" fill="rgba(100,220,120,.6)" font-family="monospace" font-size="6.5" text-anchor="middle">All clashes cleared</text>
        </g>
      </g>

      <!-- Scan line -->
      <rect x="18" y="60" width="404" height="1.5" fill="rgba(104,125,156,.2)" class="scan"/>
    </svg>