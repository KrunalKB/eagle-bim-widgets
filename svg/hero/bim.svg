<svg class="building-svg" viewBox="0 0 340 440" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="gold-glow">
            <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
            <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
          </filter>
          <filter id="gold-glow-sm">
            <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
            <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
          </filter>
          <filter id="teal-glow">
            <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
            <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
          </filter>
        </defs>
        <style>
          /* Blue wireframe on white — visible and clean */
          .g{stroke:#687d9c;fill:none;stroke-width:1.6}
          .g-bright{stroke:#4a6080;fill:none;stroke-width:1.8;filter:url(#gold-glow)}
          .g-dim{stroke:#687d9c;fill:none;stroke-width:.8;opacity:.35}
          .g-fill{fill:rgba(104,125,156,.07)}
          .g-fill-dk{fill:rgba(104,125,156,.04)}
          /* Window frames */
          .win{stroke:#687d9c;fill:rgba(104,125,156,.05);stroke-width:1;opacity:.7}
          .win-lit{stroke:#deaa57;fill:rgba(222,170,87,.15);stroke-width:1.2;filter:url(#gold-glow-sm)}
          /* MEP dashed line — gold on white */
          .mep{stroke:#deaa57;fill:none;stroke-width:1.6;stroke-dasharray:5 3}
          /* Dots */
          .dot-gold{fill:#deaa57;filter:url(#gold-glow)}
          .dot-sm{fill:#687d9c;filter:url(#gold-glow-sm)}
          /* Labels */
          .lbl{fill:rgba(104,125,156,.7);font-size:9px;font-family:monospace;font-weight:bold;letter-spacing:.05em}

          /* Animations */
          @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
          .bob{animation:bob 6s ease-in-out infinite;transform-origin:170px 260px}

          @keyframes winOn{0%,100%{fill:rgba(104,125,156,.05);stroke:#687d9c}40%{fill:rgba(222,170,87,.2);stroke:#deaa57}80%{fill:rgba(222,170,87,.08);stroke:#deaa57}}
          .w1{animation:winOn 4s .0s ease-in-out infinite}
          .w2{animation:winOn 4s .7s ease-in-out infinite}
          .w3{animation:winOn 4s 1.4s ease-in-out infinite}
          .w4{animation:winOn 4s 2.1s ease-in-out infinite}
          .w5{animation:winOn 4s 2.8s ease-in-out infinite}
          .w6{animation:winOn 4s 3.5s ease-in-out infinite}

          @keyframes mepFlow{to{stroke-dashoffset:-40}}
          .mep{animation:mepFlow 1.8s linear infinite}

          @keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.15}}
          .blink1{animation:dotBlink 2s ease-in-out infinite}
          .blink2{animation:dotBlink 2s .7s ease-in-out infinite}
          .blink3{animation:dotBlink 2s 1.4s ease-in-out infinite}

          @keyframes scanline{0%{transform:translateY(30px);opacity:0}10%{opacity:.5}90%{opacity:.1}100%{transform:translateY(380px);opacity:0}}
          .scan{animation:scanline 3.5s ease-in-out infinite}
        </style>

        <!-- Grid bg lines - very subtle on white -->
        <line x1="0" y1="80" x2="340" y2="80" stroke="rgba(104,125,156,.08)" stroke-width=".8"></line>
        <line x1="0" y1="160" x2="340" y2="160" stroke="rgba(104,125,156,.08)" stroke-width=".8"></line>
        <line x1="0" y1="240" x2="340" y2="240" stroke="rgba(104,125,156,.08)" stroke-width=".8"></line>
        <line x1="0" y1="320" x2="340" y2="320" stroke="rgba(104,125,156,.08)" stroke-width=".8"></line>
        <line x1="80" y1="0" x2="80" y2="440" stroke="rgba(104,125,156,.08)" stroke-width=".8"></line>
        <line x1="160" y1="0" x2="160" y2="440" stroke="rgba(104,125,156,.08)" stroke-width=".8"></line>
        <line x1="240" y1="0" x2="240" y2="440" stroke="rgba(104,125,156,.08)" stroke-width=".8"></line>

        <g class="bob">

          <!-- ── TOP DIAMOND CAP (isometric roof, matches reference) ── -->
          <!-- Top parallelogram face -->
          <polygon class="g-fill" points="170,52 90,96 170,140 250,96"></polygon>
          <polygon class="g-bright" points="170,52 90,96 170,140 250,96" fill="none"></polygon>

          <!-- Second cap / connection ring -->
          <polygon class="g-fill-dk" points="170,140 90,184 170,228 250,184"></polygon>
          <polygon class="g-dim" points="170,140 90,184 170,228 250,184" fill="none"></polygon>

          <!-- Vertical edges from cap down to body -->
          <line class="g-bright" x1="90" y1="96" x2="90" y2="300"></line>
          <line class="g-bright" x1="250" y1="96" x2="250" y2="300"></line>
          <line class="g-bright" x1="170" y1="228" x2="170" y2="380"></line>

          <!-- ── BODY FACES ── -->
          <!-- Left face -->
          <polygon class="g-fill" points="90,96 90,300 170,380 170,228"></polygon>
          <!-- Right face (darker) -->
          <polygon points="250,96 250,300 170,380 170,228" fill="rgba(222,170,87,.03)"></polygon>

          <!-- Left face outline -->
          <polyline class="g" points="90,300 90,96"></polyline>
          <polyline class="g" points="90,300 170,380 250,300"></polyline>
          <line class="g" x1="250" y1="96" x2="250" y2="300"></line>

          <!-- ── FLOOR LINES (left face) ── -->
          <line class="g-dim" x1="90" y1="170" x2="170" y2="228"></line>
          <line class="g-dim" x1="90" y1="210" x2="170" y2="268"></line>
          <line class="g-dim" x1="90" y1="250" x2="170" y2="308"></line>
          <line class="g-dim" x1="90" y1="290" x2="170" y2="348"></line>

          <!-- ── FLOOR LINES (right face) ── -->
          <line class="g-dim" x1="250" y1="170" x2="170" y2="228"></line>
          <line class="g-dim" x1="250" y1="210" x2="170" y2="268"></line>
          <line class="g-dim" x1="250" y1="250" x2="170" y2="308"></line>
          <line class="g-dim" x1="250" y1="290" x2="170" y2="348"></line>

          <!-- ── WINDOWS left face — 2 cols × 4 rows ── -->
          <!-- col1 row1 --> <rect class="win w1" x="100" y="152" width="26" height="18" rx="1"></rect>
          <!-- col2 row1 --> <rect class="win w4" x="136" y="168" width="24" height="17" rx="1"></rect>
          <!-- col1 row2 --> <rect class="win w2" x="100" y="192" width="26" height="18" rx="1"></rect>
          <!-- col2 row2 --> <rect class="win-lit w5" x="136" y="208" width="24" height="17" rx="1"></rect>
          <!-- col1 row3 --> <rect class="win-lit w3" x="100" y="232" width="26" height="18" rx="1"></rect>
          <!-- col2 row3 --> <rect class="win w6" x="136" y="248" width="24" height="17" rx="1"></rect>
          <!-- col1 row4 --> <rect class="win w1" x="100" y="272" width="26" height="18" rx="1"></rect>
          <!-- col2 row4 --> <rect class="win w2" x="136" y="288" width="24" height="17" rx="1"></rect>

          <!-- ── MEP DASHED LINE (teal, matches reference exactly) ── -->
          <polyline class="mep" points="136,176 118,232 118,290 100,316"></polyline>

          <!-- ── CORNER DOTS ── -->
          <circle class="dot-gold blink1" cx="90" cy="96" r="4"></circle>
          <circle class="dot-gold blink2" cx="250" cy="96" r="4"></circle>
          <circle class="dot-gold" cx="170" cy="380" r="4"></circle>
          <circle class="dot-gold blink3" cx="170" cy="52" r="3.5"></circle>
          <circle class="dot-sm" cx="90" cy="300" r="3"></circle>
          <circle class="dot-sm" cx="250" cy="300" r="3"></circle>
          <circle class="dot-gold blink1" cx="170" cy="140" r="3"></circle>

          <!-- ── DIMENSION LINE (left side, matches reference) ── -->
          <line x1="62" y1="96" x2="62" y2="300" stroke="rgba(222,170,87,.45)" stroke-width=".8"></line>
          <line x1="56" y1="96" x2="68" y2="96" stroke="rgba(222,170,87,.45)" stroke-width=".8"></line>
          <line x1="56" y1="300" x2="68" y2="300" stroke="rgba(222,170,87,.45)" stroke-width=".8"></line>
          <text x="50" y="204" class="lbl" transform="rotate(-90,50,204)" opacity=".7">12 FL</text>

          <!-- ── LABELS (right side, matches reference) ── -->
          <text x="264" y="148" class="lbl">MEP</text>
          <line x1="254" y1="146" x2="261" y2="146" stroke="rgba(222,170,87,.4)" stroke-width=".8"></line>

          <text x="264" y="230" class="lbl">STRUCT</text>
          <line x1="254" y1="228" x2="261" y2="228" stroke="rgba(222,170,87,.4)" stroke-width=".8"></line>

          <text x="264" y="312" class="lbl">ARCH</text>
          <line x1="254" y1="310" x2="261" y2="310" stroke="rgba(222,170,87,.4)" stroke-width=".8"></line>

          <!-- ── BASE PLATFORM ── -->
          <polygon points="90,300 170,380 250,300 170,220" fill="rgba(222,170,87,.05)" stroke="rgba(222,170,87,.3)" stroke-width=".8"></polygon>

        </g>

        <!-- Scanline sweep -->
        <rect x="60" y="0" width="220" height="1.5" fill="rgba(104,125,156,.15)" class="scan"></rect>

      </svg>