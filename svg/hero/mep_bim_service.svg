        <text x="75" y="111" fill="rgba(222,170,87,.9)" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold">MECHANICAL</text>
        <text x="75" y="123" fill="rgba(222,170,87,.6)" font-family="monospace" font-size="7" text-anchor="middle">HVAC</text>
