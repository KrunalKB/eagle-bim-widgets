        <rect x="262" y="415" width="44" height="14" rx="2" fill="rgba(222,170,87,.12)" stroke="rgba(222,170,87,.3)" stroke-width=".8"/>
        <text x="284" y="425" fill="rgba(222,170,87,.8)" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">LOD300</text>
        <text x="220" y="450" fill="rgba(138,148,166,.35)" font-family="monospace" font-size="7" text-anchor="middle" letter-spacing=".06em">EAGLE BIM · MEP BIM SERVICES · USA</text>
