        <rect x="152" y="52" width="136" height="14" rx="3" fill="rgba(222,170,87,.12)" stroke="rgba(222,170,87,.3)" stroke-width=".8"/>
        <text x="220" y="62" fill="rgba(222,170,87,.85)" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">LOD 300 · REVIT MEP · COORDINATION-READY</text>
      </g>

