<svg width="440" height="480" viewBox="0 0 440 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="gw2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <style>
        @keyframes buildIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes drawLine{from{stroke-dashoffset:400}to{stroke-dashoffset:0}}
        @keyframes flowDash{to{stroke-dashoffset:-20}}
        @keyframes labelPop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
        @keyframes scanMEP{0%{transform:translateY(0);opacity:0}5%{opacity:.3}93%{opacity:.15}100%{transform:translateY(400px);opacity:0}}

        .struct{animation:buildIn .5s .1s ease both;opacity:0}
        .mech{animation:buildIn .5s .6s ease both;opacity:0}
        .elec{animation:buildIn .5s 1.1s ease both;opacity:0}
        .plumb{animation:buildIn .5s 1.6s ease both;opacity:0}
        .fp{animation:buildIn .5s 2.1s ease both;opacity:0}
        .coord-badge{animation:labelPop .5s 2.7s ease both;opacity:0}
        .flow{stroke-dasharray:8 5;animation:flowDash .9s linear infinite}
        .scan2{animation:scanMEP 5s 1s linear infinite}
      </style>
      <defs><pattern id="pg3" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/></pattern></defs>
      <rect width="440" height="480" fill="url(#pg3)"/>

