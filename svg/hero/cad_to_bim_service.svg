<svg width="440" height="480" viewBox="0 0 440 480" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes cadDraw{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
        @keyframes cadFade{from{opacity:0}to{opacity:1}}
        @keyframes bimAppear{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes floatBIM{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
        @keyframes arrowPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
        @keyframes scanD{0%{transform:translateY(0);opacity:0}5%{opacity:.4}92%{opacity:.25}100%{transform:translateY(380px);opacity:0}}
        @keyframes dotAppear{from{transform:scale(0);opacity:0}60%{transform:scale(1.3)}to{transform:scale(1);opacity:1}}
        .cl{stroke:#8a94a6;stroke-width:1;fill:none;stroke-dasharray:600;animation:cadDraw 1s ease forwards;stroke-dashoffset:600}
        .cl1{animation-delay:.1s}.cl2{animation-delay:.3s}.cl3{animation-delay:.5s}
        .cl4{animation-delay:.7s}.cl5{animation-delay:.9s}.cl6{animation-delay:1.1s}
        .cl7{animation-delay:1.3s}.cl8{animation-delay:1.4s}
        .cdim{stroke:#8a94a6;stroke-width:.6;fill:none;stroke-dasharray:3 2;opacity:0;animation:cadFade .5s 1.5s ease forwards}
        .clbl{fill:#8a94a6;font-family:monospace;font-size:7px;opacity:0;animation:cadFade .4s 1.6s ease forwards}
        .bf{opacity:0;animation:bimAppear .5s ease forwards}
        .bf1{animation-delay:1.9s}.bf2{animation-delay:2.1s}.bf3{animation-delay:2.2s}
        .bf4{animation-delay:2.3s}.bf5{animation-delay:2.4s}.bf6{animation-delay:2.5s}
        .bfloat{animation:floatBIM 4s 2.6s ease-in-out infinite}
        .ap{animation:arrowPulse 1.6s 1.7s ease-in-out infinite;transform-origin:220px 240px}
        .gd{opacity:0;animation:dotAppear .35s ease forwards}
        .gd1{animation-delay:2.6s}.gd2{animation-delay:2.8s}.gd3{animation-delay:3.0s}
        .scan{animation:scanD 5.5s 2s linear infinite}
      </style>
      <defs>
        <pattern id="pg" width="22" height="22" patternUnits="userSpaceOnUse"><path d="M22 0L0 0 0 22" fill="none" stroke="rgba(104,125,156,.07)" stroke-width=".5"/></pattern>
        <filter id="gw"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <rect width="440" height="480" fill="url(#pg)"/>

      <!-- LEFT: 2D CAD panel -->
      <rect x="18" y="76" width="174" height="210" fill="rgba(248,247,245,.85)" stroke="#e2e6ed" stroke-width="1" rx="2"/>
      <text x="105" y="68" fill="#8a94a6" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold" letter-spacing=".08em">2D CAD DRAWING</text>

      <!-- Floor plan -->
      <polyline class="cl cl1" points="32,96 178,96 178,270 32,270 32,96"/>
      <line class="cl cl2" x1="32" y1="162" x2="178" y2="162"/>
      <line class="cl cl3" x1="105" y1="96" x2="105" y2="270"/>
      <line class="cl cl4" x1="32" y1="222" x2="105" y2="222"/>
      <path class="cl cl5" d="M68,162 Q82,148 96,162"/>
      <line class="cl cl6" x1="128" y1="96" x2="165" y2="96" stroke-width="2.5"/>
      <line class="cl cl7" x1="105" y1="190" x2="178" y2="190"/>
      <line class="cl cl8" x1="32" y1="136" x2="105" y2="136"/>

      <!-- Dims -->
      <line class="cdim" x1="32" y1="280" x2="178" y2="280"/>
      <line class="cdim" x1="12" y1="96" x2="12" y2="270"/>
      <text class="clbl" x="105" y="289" text-anchor="middle">12,400</text>
      <text class="clbl" x="5" y="188" text-anchor="middle" transform="rotate(-90,5,188)">7,600</text>
      <text class="clbl" x="64" y="132" text-anchor="middle" font-size="6.5">LOUNGE</text>
      <text class="clbl" x="145" y="130" text-anchor="middle" font-size="6.5">BED 1</text>
      <text class="clbl" x="64" y="248" text-anchor="middle" font-size="6.5">KITCHEN</text>
      <text class="clbl" x="140" y="208" text-anchor="middle" font-size="6">BED 2</text>

      <!-- File badges -->
      <rect x="30" y="274" width="32" height="13" rx="2" fill="rgba(138,148,166,.15)" stroke="rgba(138,148,166,.3)" stroke-width=".8"/>
      <text x="46" y="284" fill="#8a94a6" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">.DWG</text>
      <rect x="66" y="274" width="28" height="13" rx="2" fill="rgba(138,148,166,.15)" stroke="rgba(138,148,166,.3)" stroke-width=".8"/>
      <text x="80" y="284" fill="#8a94a6" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">.PDF</text>

      <!-- ARROW -->
      <g class="ap">
        <rect x="196" y="222" width="48" height="36" rx="5" fill="#deaa57" stroke-width="1.5"/>
        <text x="220" y="234" fill="white" font-family="Arial" font-size="8.5" font-weight="bold" text-anchor="middle">CAD</text>
        <text x="220" y="249" fill="white" font-family="Arial" font-size="8.5" font-weight="bold" text-anchor="middle">→ BIM</text>
        <line x1="174" y1="240" x2="196" y2="240" stroke="#deaa57" stroke-width="1.5" stroke-dasharray="4 3" opacity=".6"/>
        <line x1="244" y1="240" x2="266" y2="240" stroke="#deaa57" stroke-width="1.5" stroke-dasharray="4 3" opacity=".6"/>
      </g>

      <!-- RIGHT: 3D Revit model (isometric building) -->
      <g class="bfloat">
        <text x="350" y="68" fill="#687d9c" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold" letter-spacing=".08em">3D REVIT MODEL</text>
        <!-- Bottom face -->
        <polygon class="bf bf1" points="268,316 350,270 432,316 350,362" fill="rgba(104,125,156,.1)" stroke="#687d9c" stroke-width="1.2"/>
        <!-- Left face -->
        <polygon class="bf bf2" points="268,316 268,218 350,172 350,270" fill="rgba(104,125,156,.2)" stroke="#687d9c" stroke-width="1.2"/>
        <!-- Right face -->
        <polygon class="bf bf3" points="350,270 432,224 432,316 350,362" fill="rgba(104,125,156,.12)" stroke="#687d9c" stroke-width="1.2"/>
        <!-- Top face -->
        <polygon class="bf bf4" points="268,218 350,172 432,218 350,270" fill="rgba(104,125,156,.24)" stroke="#687d9c" stroke-width="1.2"/>
        <!-- Windows right face -->
        <rect class="bf bf5" x="364" y="242" width="19" height="25" rx="1" fill="rgba(222,170,87,.2)" stroke="#deaa57" stroke-width="1"/>
        <rect class="bf bf5" x="394" y="242" width="19" height="25" rx="1" fill="rgba(222,170,87,.2)" stroke="#deaa57" stroke-width="1"/>
        <!-- Door left face -->
        <rect class="bf bf5" x="284" y="255" width="16" height="26" rx="1" fill="rgba(104,125,156,.3)" stroke="#687d9c" stroke-width=".8"/>
        <!-- Roof lines -->
        <line class="bf bf6" x1="268" y1="218" x2="350" y2="270" stroke="#687d9c" stroke-width=".6" opacity=".4"/>
        <line class="bf bf6" x1="350" y1="172" x2="350" y2="270" stroke="#687d9c" stroke-width=".6" opacity=".4"/>
        <!-- Data dots -->
        <circle class="gd gd1" cx="368" cy="228" r="5" fill="#deaa57"/>
        <circle class="gd gd2" cx="350" cy="172" r="5" fill="#deaa57"/>
        <circle class="gd gd3" cx="432" cy="218" r="4" fill="#deaa57"/>
        <!-- Tooltip -->
        <rect class="bf bf6" x="358" y="196" width="78" height="22" rx="3" fill="rgba(222,170,87,.15)" stroke="rgba(222,170,87,.4)" stroke-width=".8"/>
        <text class="bf bf6" x="397" y="210" fill="#c8943d" font-family="monospace" font-size="7.5" text-anchor="middle" font-weight="bold">LOD 300 · REVIT</text>
        <!-- Output badges -->
        <rect class="bf bf6" x="268" y="370" width="38" height="14" rx="2" fill="rgba(104,125,156,.12)" stroke="rgba(104,125,156,.3)" stroke-width=".8"/>
        <text class="bf bf6" x="287" y="380" fill="#687d9c" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">.RVT</text>
        <rect class="bf bf6" x="310" y="370" width="36" height="14" rx="2" fill="rgba(104,125,156,.12)" stroke="rgba(104,125,156,.3)" stroke-width=".8"/>
        <text class="bf bf6" x="328" y="380" fill="#687d9c" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">.IFC</text>
        <rect class="bf bf6" x="350" y="370" width="38" height="14" rx="2" fill="rgba(222,170,87,.12)" stroke="rgba(222,170,87,.3)" stroke-width=".8"/>
        <text class="bf bf6" x="369" y="380" fill="#c8943d" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">LOD300</text>
      </g>

      <!-- Scan line -->
      <rect x="0" y="0" width="440" height="1.5" fill="rgba(104,125,156,.15)" class="scan"/>
      <text x="220" y="430" fill="#8a94a6" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing=".06em">EAGLE BIM · CAD TO BIM SERVICES · USA</text>
    </svg>