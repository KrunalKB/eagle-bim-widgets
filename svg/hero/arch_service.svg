<svg class="fp-svg" viewBox="0 0 440 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="fp-glow">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fp-glow-sm">
          <feGaussianBlur stdDeviation="1" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <style>
        /* Floor plan uses blue strokes on white */
        .fp-wall{stroke:#687d9c;stroke-width:6;fill:none;stroke-linecap:square}
        .fp-wall-thin{stroke:#687d9c;stroke-width:3;fill:none;stroke-linecap:square}
        .fp-dim{stroke:#8a9db8;stroke-width:.8;fill:none;stroke-dasharray:3 2}
        .fp-dim-solid{stroke:#8a9db8;stroke-width:.8;fill:none}
        .fp-lbl{fill:#8a94a6;font-size:8px;font-family:monospace;letter-spacing:.05em}
        .fp-room{fill:rgba(104,125,156,.05)}
        .fp-room-label{fill:#4a5568;font-size:9px;font-family:monospace;font-weight:bold;letter-spacing:.06em}
        .fp-gold{stroke:#deaa57;stroke-width:1.2;fill:none;filter:url(#fp-glow-sm)}
        .fp-dot{fill:#deaa57;filter:url(#fp-glow)}
        .fp-dot-blue{fill:#687d9c}
        .fp-hatch{stroke:#8a9db8;stroke-width:.5;opacity:.3}

        /* Draw-on animation */
        @keyframes drawWall{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes dimAppear{from{opacity:0;transform:translateY(-4px)}to{opacity:.7;transform:translateY(0)}}
        @keyframes dotPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
        @keyframes labelIn{from{opacity:0}to{opacity:1}}
        @keyframes pulse2{0%,100%{opacity:.8}50%{opacity:.3}}
        @keyframes scanH{0%{transform:translateX(-20px);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateX(380px);opacity:0}}

        .w1{stroke-dasharray:1000;animation:drawWall 1.2s .1s ease forwards}
        .w2{stroke-dasharray:1000;animation:drawWall 1.2s .3s ease forwards;stroke-dashoffset:1000}
        .w3{stroke-dasharray:1000;animation:drawWall 1.2s .5s ease forwards;stroke-dashoffset:1000}
        .w4{stroke-dasharray:1000;animation:drawWall 1.2s .7s ease forwards;stroke-dashoffset:1000}
        .w5{stroke-dasharray:1000;animation:drawWall 1.0s .9s ease forwards;stroke-dashoffset:1000}
        .w6{stroke-dasharray:1000;animation:drawWall 1.0s 1.1s ease forwards;stroke-dashoffset:1000}
        .w7{stroke-dasharray:1000;animation:drawWall .8s 1.3s ease forwards;stroke-dashoffset:1000}
        .w8{stroke-dasharray:1000;animation:drawWall .8s 1.5s ease forwards;stroke-dashoffset:1000}
        .dim-g{opacity:0;animation:dimAppear .5s 1.8s ease forwards}
        .lbl-g{opacity:0;animation:labelIn .4s 2.0s ease forwards}
        .dot-g{transform:scale(0);opacity:0;animation:dotPop .4s 2.1s ease forwards;transform-origin:center}
        .scan-line{animation:scanH 4s 2.5s ease-in-out infinite}
        .gold-caret{animation:pulse2 2s 2.2s ease-in-out infinite}
      </style>

      <!-- Background grid -->
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="440" height="500" fill="url(#grid)"/>

      <!-- ── FLOOR PLAN ROOMS ── -->
      <!-- Room fills -->
      <rect class="fp-room" x="60" y="60" width="160" height="120"/>
      <rect class="fp-room" x="60" y="200" width="160" height="100"/>
      <rect class="fp-room" x="60" y="320" width="100" height="80"/>
      <rect class="fp-room" x="240" y="60" width="140" height="180"/>
      <rect class="fp-room" x="240" y="260" width="140" height="140"/>
      <rect style="fill:rgba(222,170,87,.06)" x="180" y="200" width="60" height="100"/>

      <!-- ── WALLS — outer perimeter ── -->
      <polyline class="fp-wall w1" points="60,60 380,60"/>
      <polyline class="fp-wall w1" points="380,60 380,420"/>
      <polyline class="fp-wall w2" points="380,420 60,420"/>
      <polyline class="fp-wall w2" points="60,420 60,60"/>

      <!-- Internal walls -->
      <line class="fp-wall-thin w3" x1="220" y1="60" x2="220" y2="420"/>
      <line class="fp-wall-thin w3" x1="60" y1="200" x2="220" y2="200"/>
      <line class="fp-wall-thin w4" x1="60" y1="320" x2="220" y2="320"/>
      <line class="fp-wall-thin w5" x1="240" y1="260" x2="380" y2="260"/>
      <line class="fp-wall-thin w6" x1="160" y1="320" x2="160" y2="420"/>

      <!-- Wall hatch fills for thickness -->
      <rect style="fill:rgba(104,125,156,.12)" x="57" y="57" width="6" height="366"/>
      <rect style="fill:rgba(104,125,156,.12)" x="57" y="57" width="323" height="6"/>
      <rect style="fill:rgba(104,125,156,.12)" x="374" y="57" width="6" height="366"/>
      <rect style="fill:rgba(104,125,156,.12)" x="57" y="417" width="323" height="6"/>

      <!-- Door openings (arcs) -->
      <g class="w7">
        <!-- Door 1: Living Room -->
        <line x1="120" y1="200" x2="150" y2="200" stroke="#687d9c" stroke-width="3" fill="none"/>
        <path d="M120,200 Q135,185 150,200" stroke="#687d9c" stroke-width=".8" fill="rgba(104,125,156,.08)" stroke-dasharray="none"/>
        <!-- Door 2: Right room -->
        <line x1="290" y1="260" x2="320" y2="260" stroke="#687d9c" stroke-width="3" fill="none"/>
        <path d="M290,260 Q305,245 320,260" stroke="#687d9c" stroke-width=".8" fill="rgba(104,125,156,.08)"/>
        <!-- Door 3: Bottom left -->
        <line x1="60" y1="370" x2="60" y2="340" stroke="#687d9c" stroke-width="3" fill="none"/>
        <path d="M60,370 Q75,355 60,340" stroke="#687d9c" stroke-width=".8" fill="rgba(104,125,156,.08)"/>
      </g>

      <!-- Windows (thin double lines) -->
      <g class="w8">
        <line x1="160" y1="60" x2="200" y2="60" stroke="white" stroke-width="4"/>
        <line x1="162" y1="60" x2="198" y2="60" stroke="#687d9c" stroke-width=".8"/>
        <line x1="162" y1="63" x2="198" y2="63" stroke="#687d9c" stroke-width=".8"/>

        <line x1="290" y1="60" x2="350" y2="60" stroke="white" stroke-width="4"/>
        <line x1="292" y1="60" x2="348" y2="60" stroke="#687d9c" stroke-width=".8"/>
        <line x1="292" y1="63" x2="348" y2="63" stroke="#687d9c" stroke-width=".8"/>

        <line x1="380" y1="100" x2="380" y2="160" stroke="white" stroke-width="4"/>
        <line x1="380" y1="102" x2="380" y2="158" stroke="#687d9c" stroke-width=".8"/>
        <line x1="377" y1="102" x2="377" y2="158" stroke="#687d9c" stroke-width=".8"/>

        <line x1="380" y1="300" x2="380" y2="360" stroke="white" stroke-width="4"/>
        <line x1="380" y1="302" x2="380" y2="358" stroke="#687d9c" stroke-width=".8"/>
        <line x1="377" y1="302" x2="377" y2="358" stroke="#687d9c" stroke-width=".8"/>
      </g>

      <!-- ── DIMENSION LINES ── -->
      <g class="dim-g">
        <!-- Horizontal top dimension -->
        <line class="fp-dim-solid" x1="60" y1="38" x2="380" y2="38"/>
        <line class="fp-dim-solid" x1="60" y1="33" x2="60" y2="43"/>
        <line class="fp-dim-solid" x1="380" y1="33" x2="380" y2="43"/>
        <text class="fp-lbl" x="210" y="35" text-anchor="middle">16,200</text>

        <!-- Vertical left dimension -->
        <line class="fp-dim-solid" x1="38" y1="60" x2="38" y2="420"/>
        <line class="fp-dim-solid" x1="33" y1="60" x2="43" y2="60"/>
        <line class="fp-dim-solid" x1="33" y1="420" x2="43" y2="420"/>
        <text class="fp-lbl" x="28" y="245" text-anchor="middle" transform="rotate(-90,28,245)">18,000</text>

        <!-- Internal dimensions -->
        <line class="fp-dim" x1="60" y1="55" x2="220" y2="55"/>
        <line class="fp-dim" x1="220" y1="55" x2="380" y2="55"/>
        <text class="fp-lbl" x="140" y="53" text-anchor="middle">8,600</text>
        <text class="fp-lbl" x="300" y="53" text-anchor="middle">7,600</text>

        <!-- Sub dims left -->
        <line class="fp-dim" x1="35" y1="60" x2="35" y2="200"/>
        <line class="fp-dim" x1="35" y1="200" x2="35" y2="320"/>
        <line class="fp-dim" x1="35" y1="320" x2="35" y2="420"/>
        <text class="fp-lbl" x="25" y="136" text-anchor="middle" transform="rotate(-90,25,136)">6,000</text>
        <text class="fp-lbl" x="25" y="266" text-anchor="middle" transform="rotate(-90,25,266)">5,000</text>
        <text class="fp-lbl" x="25" y="376" text-anchor="middle" transform="rotate(-90,25,376)">5,000</text>
      </g>

      <!-- ── ROOM LABELS ── -->
      <g class="lbl-g">
        <text class="fp-room-label" x="140" y="118" text-anchor="middle">LIVING ROOM</text>
        <text class="fp-lbl" x="140" y="130" text-anchor="middle">38.4 m²</text>

        <text class="fp-room-label" x="120" y="253" text-anchor="middle">BEDROOM 1</text>
        <text class="fp-lbl" x="120" y="265" text-anchor="middle">22.0 m²</text>

        <text class="fp-room-label" x="105" y="365" text-anchor="middle">BATH</text>
        <text class="fp-lbl" x="105" y="377" text-anchor="middle">8.2 m²</text>

        <text class="fp-room-label" x="310" y="155" text-anchor="middle">MASTER BED</text>
        <text class="fp-lbl" x="310" y="167" text-anchor="middle">32.8 m²</text>

        <text class="fp-room-label" x="310" y="335" text-anchor="middle">KITCHEN</text>
        <text class="fp-lbl" x="310" y="347" text-anchor="middle">26.6 m²</text>

        <text class="fp-room-label" x="210" y="253" text-anchor="middle" style="font-size:7px">HALL</text>
      </g>

      <!-- ── GOLD ANNOTATION LAYER ── -->
      <g class="dim-g">
        <!-- North arrow -->
        <circle cx="406" cy="80" r="18" fill="none" stroke="rgba(104,125,156,.2)" stroke-width="1"/>
        <path d="M406,64 L410,84 L406,80 L402,84 Z" fill="#deaa57" opacity=".8"/>
        <text x="406" y="105" fill="rgba(104,125,156,.6)" font-size="8" text-anchor="middle" font-family="monospace" font-weight="bold">N</text>

        <!-- Scale bar -->
        <line x1="60" y1="448" x2="160" y2="448" stroke="#8a9db8" stroke-width="1.2"/>
        <line x1="60" y1="444" x2="60" y2="452" stroke="#8a9db8" stroke-width="1.2"/>
        <line x1="110" y1="444" x2="110" y2="452" stroke="#8a9db8" stroke-width="1.2"/>
        <line x1="160" y1="444" x2="160" y2="452" stroke="#8a9db8" stroke-width="1.2"/>
        <text x="85" y="462" fill="#8a94a6" font-size="7.5" text-anchor="middle" font-family="monospace">0    5m</text>
        <text x="147" y="462" fill="#8a94a6" font-size="7.5" text-anchor="middle" font-family="monospace">10m</text>

        <!-- Drawing title block strip -->
        <rect x="220" y="436" width="200" height="48" fill="rgba(104,125,156,.05)" stroke="rgba(104,125,156,.15)" stroke-width=".8"/>
        <line x1="220" y1="452" x2="420" y2="452" stroke="rgba(104,125,156,.15)" stroke-width=".6"/>
        <text x="230" y="447" fill="#687d9c" font-size="7.5" font-family="monospace" font-weight="bold" letter-spacing=".05em">EAGLE BIM · ARCHITECTURAL BIM</text>
        <text x="230" y="461" fill="#8a94a6" font-size="7" font-family="monospace">FLOOR PLAN · LEVEL 01 · SD PHASE</text>
        <text x="230" y="475" fill="#8a94a6" font-size="7" font-family="monospace">SHEET A-100 · SCALE 1:100</text>
        <text x="400" y="475" fill="#deaa57" font-size="7.5" font-family="monospace" font-weight="bold" text-anchor="end">REV.02</text>
      </g>

      <!-- Gold callout dots at key intersections -->
      <g class="dot-g">
        <circle class="fp-dot" cx="60" cy="60" r="3.5"/>
        <circle class="fp-dot" cx="380" cy="60" r="3.5"/>
        <circle class="fp-dot" cx="380" cy="420" r="3.5"/>
        <circle class="fp-dot" cx="60" cy="420" r="3.5"/>
        <circle class="fp-dot" cx="220" cy="60" r="3"/>
        <circle class="fp-dot" cx="220" cy="420" r="3"/>
        <circle class="fp-dot" cx="60" cy="200" r="2.5"/>
        <circle class="fp-dot" cx="220" cy="200" r="2.5"/>
        <circle class="fp-dot" cx="60" cy="320" r="2.5"/>
        <circle class="fp-dot" cx="220" cy="320" r="2.5"/>
        <circle class="fp-dot" cx="240" cy="260" r="2.5"/>
        <circle class="fp-dot" cx="380" cy="260" r="2.5"/>
      </g>

      <!-- Active cursor / drafting caret -->
      <g class="gold-caret">
        <line x1="220" y1="316" x2="220" y2="324" stroke="#deaa57" stroke-width="1.5"/>
        <line x1="216" y1="320" x2="224" y2="320" stroke="#deaa57" stroke-width="1.5"/>
        <circle cx="220" cy="320" r="4" fill="none" stroke="#deaa57" stroke-width="1"/>
      </g>

      <!-- Horizontal scan line -->
      <rect x="0" y="0" width="440" height="1.2" fill="rgba(104,125,156,.2)" class="scan-line"/>

      <!-- Revision cloud on living room -->
      <g class="dim-g" style="animation-delay:2.3s">
        <path d="M75,70 Q80,65 90,68 Q95,63 105,66 Q110,61 120,64 Q125,59 135,62 Q138,56 148,60 Q150,55 160,59 Q163,53 170,57 Q172,52 180,56 Q183,50 190,54 Q192,49 200,53 Q205,48 210,52 Q212,57 216,60 Q218,65 215,72 Q218,78 214,84 Q218,90 213,96 Q215,102 210,106 Q208,112 202,114 Q204,120 198,123 Q195,128 188,127 Q183,133 176,131 Q170,136 163,133 Q156,138 149,135 Q142,139 136,136 Q130,140 124,137 Q119,141 113,138 Q108,143 102,140 Q98,144 93,141 Q89,145 85,142 Q82,147 78,144 Q76,149 73,146 Q70,150 68,146 Q66,150 64,147 Q63,151 61,148 Q60,152 58,149 Q57,153 55,150 Q55,145 57,140 Q56,135 58,130 Q57,125 59,120 Q58,115 60,110 Q59,105 61,100 Q60,95 62,90 Q61,85 63,80 Q62,75 65,71 Q68,66 72,68Z" fill="rgba(222,170,87,.05)" stroke="#deaa57" stroke-width=".8" stroke-dasharray="4 2"/>
        <text x="138" y="100" fill="#deaa57" font-size="7" font-family="monospace" text-anchor="middle" opacity=".8">REVISION ZONE</text>
      </g>
    </svg>