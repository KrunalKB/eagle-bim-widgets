<svg width="400" height="440" viewBox="0 0 400 440" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes drawWall{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
        @keyframes rdsAppear{from{opacity:0}to{opacity:1}}
        @keyframes rdsDim{from{stroke-dashoffset:300;opacity:0}to{stroke-dashoffset:0;opacity:1}}
        @keyframes rdsTag{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
        @keyframes rdsCursor{0%,100%{opacity:1}50%{opacity:0}}
        @keyframes rdsScan{0%{transform:translateY(0);opacity:0}4%{opacity:.22}92%{opacity:.1}100%{transform:translateY(400px);opacity:0}}
        .rds-sheet{stroke-dasharray:1500;stroke-dashoffset:1500;animation:drawWall 1s .1s ease forwards}
        .rds-hdr{animation:rdsAppear .4s .8s ease both;opacity:0}
        .rds-w1{stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawWall .9s 1.0s ease forwards}
        .rds-w2{stroke-dasharray:600;stroke-dashoffset:600;animation:drawWall .7s 1.5s ease forwards}
        .rds-w3{stroke-dasharray:400;stroke-dashoffset:400;animation:drawWall .5s 1.9s ease forwards}
        .rds-w4{stroke-dasharray:300;stroke-dashoffset:300;animation:drawWall .4s 2.2s ease forwards}
        .rds-d1{animation:rdsDim .5s 2.5s ease both;opacity:0}
        .rds-d2{animation:rdsDim .5s 2.7s ease both;opacity:0}
        .rds-d3{animation:rdsDim .5s 2.9s ease both;opacity:0}
        .rds-l1{animation:rdsAppear .3s 2.6s ease both;opacity:0}
        .rds-l2{animation:rdsAppear .3s 2.8s ease both;opacity:0}
        .rds-l3{animation:rdsAppear .3s 3.0s ease both;opacity:0}
        .rds-l4{animation:rdsAppear .3s 3.2s ease both;opacity:0}
        .rds-t1{animation:rdsTag .3s 3.0s ease both;opacity:0}
        .rds-t2{animation:rdsTag .3s 3.1s ease both;opacity:0}
        .rds-t3{animation:rdsTag .3s 3.2s ease both;opacity:0}
        .rds-cur{animation:rdsCursor .9s 1s step-end infinite}
        .rds-scan{animation:rdsScan 6s 1s linear infinite}
      </style>
      <defs>
        <pattern id="rdsgrid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M20 0L0 0 0 20" fill="none" stroke="rgba(104,125,156,.05)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="400" height="440" fill="url(#rdsgrid)"/>

      <!-- Sheet outer border -->
      <rect class="rds-sheet" x="20" y="16" width="360" height="408" rx="2"
            fill="rgba(250,249,248,.97)" stroke="rgba(74,96,128,.65)" stroke-width="1.5"/>

      <!-- Header strip -->
      <g class="rds-hdr">
        <rect x="20" y="16" width="360" height="24" fill="rgba(104,125,156,.1)" stroke="none"/>
        <line x1="20" y1="40" x2="380" y2="40" stroke="rgba(104,125,156,.35)" stroke-width=".8"/>
        <text x="32" y="32" fill="rgba(74,96,128,.8)" font-family="monospace" font-size="8.5"
              font-weight="bold" letter-spacing=".07em">FLOOR PLAN — LEVEL 02</text>
        <text x="272" y="32" fill="rgba(104,125,156,.55)" font-family="monospace" font-size="7.5">A-201  |  1:100</text>
        <text x="358" y="32" fill="#deaa57" font-family="monospace" font-size="9"
              font-weight="bold" text-anchor="end">P2</text>
        <!-- blinking cursor -->
        <rect class="rds-cur" x="362" y="22" width="2" height="13"
              fill="rgba(74,96,128,.7)"/>
      </g>

      <!-- ── FLOOR PLAN WALLS ── -->
      <!-- Outer perimeter (thick) -->
      <rect class="rds-w1" x="55" y="54" width="292" height="248"
            fill="rgba(104,125,156,.03)" stroke="rgba(26,34,51,.78)" stroke-width="3.5"
            stroke-dasharray="1000"/>
      <!-- Main internal horizontal wall -->
      <line class="rds-w2" x1="55" y1="168" x2="347" y2="168"
            stroke="rgba(26,34,51,.65)" stroke-width="2.5"/>
      <!-- Main internal vertical wall -->
      <line class="rds-w2" x1="201" y1="54" x2="201" y2="302"
            stroke="rgba(26,34,51,.65)" stroke-width="2.5"/>
      <!-- Secondary vertical -->
      <line class="rds-w3" x1="271" y1="168" x2="271" y2="302"
            stroke="rgba(26,34,51,.5)" stroke-width="2"/>
      <!-- Secondary horizontal -->
      <line class="rds-w3" x1="55" y1="238" x2="201" y2="238"
            stroke="rgba(26,34,51,.45)" stroke-width="2"/>
      <!-- Door opening + arc (room 1) -->
      <line class="rds-w4" x1="201" y1="128" x2="201" y2="190"
            stroke="rgba(250,249,248,.98)" stroke-width="5"/>
      <path class="rds-w4" d="M201,128 Q231,128 231,158"
            fill="none" stroke="rgba(26,34,51,.45)" stroke-width="1.5" stroke-dasharray="1000"/>
      <!-- Door opening + arc (room 3) -->
      <line class="rds-w4" x1="271" y1="210" x2="271" y2="260"
            stroke="rgba(250,249,248,.98)" stroke-width="5"/>
      <path class="rds-w4" d="M271,210 Q301,210 301,240"
            fill="none" stroke="rgba(26,34,51,.45)" stroke-width="1.5" stroke-dasharray="1000"/>
      <!-- Window (thick line on north wall) -->
      <line class="rds-w3" x1="82" y1="54" x2="152" y2="54"
            stroke="rgba(104,125,156,.85)" stroke-width="5"/>
      <line class="rds-w3" x1="82" y1="50" x2="82" y2="58"
            stroke="rgba(104,125,156,.7)" stroke-width="1.2"/>
      <line class="rds-w3" x1="152" y1="50" x2="152" y2="58"
            stroke="rgba(104,125,156,.7)" stroke-width="1.2"/>
      <line class="rds-w3" x1="250" y1="54" x2="320" y2="54"
            stroke="rgba(104,125,156,.85)" stroke-width="5"/>
      <line class="rds-w3" x1="250" y1="50" x2="250" y2="58"
            stroke="rgba(104,125,156,.7)" stroke-width="1.2"/>
      <line class="rds-w3" x1="320" y1="50" x2="320" y2="58"
            stroke="rgba(104,125,156,.7)" stroke-width="1.2"/>

      <!-- ── ROOM LABELS ── -->
      <g class="rds-l1">
        <text x="120" y="118" fill="rgba(26,34,51,.65)" font-family="monospace"
              font-size="12" text-anchor="middle" font-weight="bold">OFFICE A</text>
        <text x="120" y="134" fill="rgba(104,125,156,.6)" font-family="monospace"
              font-size="9.5" text-anchor="middle">32.4 m²</text>
      </g>
      <g class="rds-l2">
        <text x="276" y="118" fill="rgba(26,34,51,.65)" font-family="monospace"
              font-size="11" text-anchor="middle" font-weight="bold">MEETING</text>
        <text x="276" y="133" fill="rgba(104,125,156,.6)" font-family="monospace"
              font-size="9.5" text-anchor="middle">18.6 m²</text>
      </g>
      <g class="rds-l3">
        <text x="125" y="208" fill="rgba(26,34,51,.58)" font-family="monospace"
              font-size="10.5" text-anchor="middle" font-weight="bold">CORRIDOR</text>
      </g>
      <g class="rds-l4">
        <text x="236" y="270" fill="rgba(26,34,51,.6)" font-family="monospace"
              font-size="11" text-anchor="middle" font-weight="bold">BREAKOUT</text>
        <text x="236" y="285" fill="rgba(104,125,156,.55)" font-family="monospace"
              font-size="9.5" text-anchor="middle">24.8 m²</text>
      </g>

      <!-- ── DIMENSION STRINGS ── -->
      <!-- Horizontal span top half -->
      <g class="rds-d1">
        <line x1="55" y1="320" x2="347" y2="320" stroke="rgba(74,96,128,.65)" stroke-width="1"/>
        <line x1="55" y1="315" x2="55" y2="325" stroke="rgba(74,96,128,.65)" stroke-width="1"/>
        <line x1="201" y1="315" x2="201" y2="325" stroke="rgba(74,96,128,.65)" stroke-width="1"/>
        <line x1="347" y1="315" x2="347" y2="325" stroke="rgba(74,96,128,.65)" stroke-width="1"/>
        <text x="128" y="335" fill="rgba(74,96,128,.85)" font-family="monospace"
              font-size="10" text-anchor="middle" font-weight="bold">7 600</text>
        <text x="274" y="335" fill="rgba(74,96,128,.85)" font-family="monospace"
              font-size="10" text-anchor="middle" font-weight="bold">7 600</text>
      </g>
      <!-- Overall total -->
      <g class="rds-d2">
        <line x1="55" y1="350" x2="347" y2="350" stroke="rgba(74,96,128,.45)" stroke-width=".9"/>
        <line x1="55" y1="345" x2="55" y2="355" stroke="rgba(74,96,128,.45)" stroke-width=".9"/>
        <line x1="347" y1="345" x2="347" y2="355" stroke="rgba(74,96,128,.45)" stroke-width=".9"/>
        <text x="201" y="364" fill="rgba(74,96,128,.8)" font-family="monospace"
              font-size="10" text-anchor="middle" font-weight="bold">15 200</text>
      </g>
      <!-- Vertical height dim -->
      <g class="rds-d3">
        <line x1="31" y1="54" x2="31" y2="302" stroke="rgba(74,96,128,.65)" stroke-width="1"/>
        <line x1="26" y1="54" x2="36" y2="54" stroke="rgba(74,96,128,.65)" stroke-width="1"/>
        <line x1="26" y1="168" x2="36" y2="168" stroke="rgba(74,96,128,.65)" stroke-width="1"/>
        <line x1="26" y1="302" x2="36" y2="302" stroke="rgba(74,96,128,.65)" stroke-width="1"/>
        <text x="17" y="115" fill="rgba(74,96,128,.85)" font-family="monospace"
              font-size="10" text-anchor="middle" transform="rotate(-90,17,115)" font-weight="bold">6 000</text>
        <text x="17" y="240" fill="rgba(74,96,128,.85)" font-family="monospace"
              font-size="10" text-anchor="middle" transform="rotate(-90,17,240)" font-weight="bold">6 000</text>
      </g>

      <!-- ── ANNOTATION TAGS ── -->
      <!-- Room tag bubble -->
      <g class="rds-t1">
        <circle cx="120" cy="74" r="12" fill="none" stroke="rgba(74,96,128,.6)" stroke-width="1.2"/>
        <text x="120" y="79" fill="rgba(74,96,128,.85)" font-family="monospace"
              font-size="10" text-anchor="middle" font-weight="bold">1</text>
      </g>
      <g class="rds-t2">
        <circle cx="276" cy="74" r="12" fill="none" stroke="rgba(74,96,128,.6)" stroke-width="1.2"/>
        <text x="276" y="79" fill="rgba(74,96,128,.85)" font-family="monospace"
              font-size="10" text-anchor="middle" font-weight="bold">2</text>
      </g>
      <!-- Sheet reference tag -->
      <g class="rds-t3">
        <rect x="148" y="146" width="52" height="17" rx="2"
              fill="rgba(222,170,87,.15)" stroke="rgba(222,170,87,.6)" stroke-width="1"/>
        <text x="174" y="158" fill="rgba(180,120,30,.9)" font-family="monospace"
              font-size="9" text-anchor="middle" font-weight="bold">A-201</text>
      </g>

      <!-- ── TITLE BLOCK ── -->
      <g class="rds-hdr">
        <line x1="20" y1="384" x2="380" y2="384" stroke="rgba(104,125,156,.4)" stroke-width=".8"/>
        <rect x="20" y="384" width="360" height="40" fill="rgba(104,125,156,.06)"/>
        <line x1="210" y1="384" x2="210" y2="424" stroke="rgba(104,125,156,.25)" stroke-width=".6"/>
        <line x1="310" y1="384" x2="310" y2="424" stroke="rgba(104,125,156,.25)" stroke-width=".6"/>
        <!-- Project name -->
        <text x="30" y="398" fill="rgba(104,125,156,.5)" font-family="monospace"
              font-size="6.5" letter-spacing=".06em">PROJECT</text>
        <text x="30" y="412" fill="rgba(26,34,51,.7)" font-family="monospace"
              font-size="9" font-weight="bold">OFFICE TOWER · HOUSTON TX</text>
        <!-- Producer -->
        <text x="220" y="398" fill="rgba(104,125,156,.5)" font-family="monospace"
              font-size="6.5">PRODUCED BY</text>
        <text x="220" y="412" fill="rgba(74,96,128,.75)" font-family="monospace"
              font-size="9" font-weight="bold">EAGLE BIM</text>
        <text x="220" y="421" fill="rgba(104,125,156,.4)" font-family="monospace"
              font-size="6">Revit Drafting Services</text>
        <!-- Sheet no -->
        <text x="320" y="400" fill="rgba(104,125,156,.5)" font-family="monospace"
              font-size="6.5" text-anchor="middle">SHEET No.</text>
        <text x="320" y="416" fill="rgba(26,34,51,.75)" font-family="monospace"
              font-size="14" text-anchor="middle" font-weight="bold">A-201</text>
      </g>

      <!-- Scan line -->
      <rect class="rds-scan" x="20" y="16" width="360" height="1.5"
            fill="rgba(104,125,156,.2)"/>
    </svg>