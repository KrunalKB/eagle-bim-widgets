<svg width="480" height="400" viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes wglow{0%,100%{opacity:.25}50%{opacity:.65}}
        @keyframes scan{0%{transform:translateY(0);opacity:0}5%{opacity:.12}90%{opacity:.07}100%{transform:translateY(400px);opacity:0}}
        .sk1{animation:rise .55s .08s ease both;opacity:0}.sk2{animation:rise .55s .18s ease both;opacity:0}
        .sk3{animation:rise .55s .28s ease both;opacity:0}.sk4{animation:rise .55s .38s ease both;opacity:0}
        .sk5{animation:rise .55s .48s ease both;opacity:0}.sk6{animation:rise .55s .15s ease both;opacity:0}
        .w1{animation:wglow 3s ease infinite}.w2{animation:wglow 3s 1.2s ease infinite}.w3{animation:wglow 3s 2.1s ease infinite}
        .scl{animation:scan 8s 1s linear infinite}
      </style>
      <defs><pattern id="migrid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0L0 0 0 24" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/></pattern></defs>
      <rect width="480" height="400" fill="url(#migrid)"/>
      <rect x="20" y="365" width="440" height="3" fill="rgba(104,125,156,.2)"/>
      <line x1="20" y1="365" x2="460" y2="365" stroke="rgba(222,170,87,.2)" stroke-width="1"/>
      <g class="sk6" opacity=".4"><rect x="20" y="310" width="28" height="55" fill="rgba(104,125,156,.14)"/><rect x="52" y="295" width="22" height="70" fill="rgba(104,125,156,.15)"/></g>
      <!-- Freedom Tower — octagonal Spanish Renaissance crown -->
      <g class="sk1">
        <rect x="86" y="195" width="46" height="170" fill="rgba(104,125,156,.22)" stroke="rgba(104,125,156,.32)" stroke-width=".7"/>
        <rect x="92" y="175" width="34" height="22" fill="rgba(104,125,156,.3)"/>
        <rect x="98" y="157" width="22" height="20" fill="rgba(104,125,156,.38)"/>
        <polygon points="109,157 120,162 120,150 109,145 98,150 98,162" fill="rgba(104,125,156,.46)"/>
        <rect x="107" y="135" width="4" height="14" fill="rgba(104,125,156,.55)"/>
        <line x1="109" y1="105" x2="109" y2="135" stroke="rgba(222,170,87,.55)" stroke-width="2"/>
        <circle cx="109" cy="103" r="3" fill="rgba(222,170,87,.8)" class="w1"/>
        <rect x="93" y="214" width="8" height="6" fill="rgba(222,170,87,.22)" class="w2"/>
        <rect x="108" y="214" width="8" height="6" fill="rgba(222,170,87,.15)"/>
        <rect x="123" y="214" width="8" height="6" fill="rgba(222,170,87,.2)" class="w3"/>
      </g>
      <!-- Brickell City Centre — twin towers -->
      <g class="sk2">
        <rect x="148" y="105" width="44" height="260" fill="rgba(104,125,156,.24)" stroke="rgba(104,125,156,.34)" stroke-width=".7"/>
        <rect x="200" y="125" width="36" height="240" fill="rgba(104,125,156,.20)" stroke="rgba(104,125,156,.28)" stroke-width=".7"/>
        <rect x="192" y="148" width="8" height="12" fill="rgba(104,125,156,.3)"/>
        <line x1="165" y1="105" x2="165" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="192" y1="105" x2="192" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="215" y1="125" x2="215" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <rect x="153" y="118" width="9" height="7" fill="rgba(222,170,87,.22)" class="w1"/>
        <rect x="169" y="118" width="9" height="7" fill="rgba(222,170,87,.15)"/>
        <rect x="185" y="118" width="9" height="7" fill="rgba(222,170,87,.2)" class="w2"/>
        <rect x="204" y="138" width="9" height="7" fill="rgba(222,170,87,.2)" class="w3"/>
      </g>
      <!-- Panorama Tower — tallest, curved elliptical crown -->
      <g class="sk3">
        <rect x="248" y="40" width="80" height="325" fill="rgba(104,125,156,.28)" stroke="rgba(104,125,156,.42)" stroke-width=".7"/>
        <ellipse cx="288" cy="40" rx="40" ry="16" fill="rgba(104,125,156,.4)" stroke="rgba(104,125,156,.48)" stroke-width=".8"/>
        <ellipse cx="288" cy="34" rx="26" ry="11" fill="rgba(104,125,156,.48)"/>
        <line x1="288" y1="22" x2="288" y2="3" stroke="rgba(222,170,87,.7)" stroke-width="2.8"/>
        <circle cx="288" cy="1" r="4" fill="rgba(222,170,87,.9)" class="w2"/>
        <line x1="262" y1="40" x2="262" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <line x1="288" y1="40" x2="288" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <line x1="314" y1="40" x2="314" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <rect x="254" y="58" width="11" height="8" fill="rgba(222,170,87,.28)" class="w1"/>
        <rect x="272" y="58" width="11" height="8" fill="rgba(222,170,87,.19)"/>
        <rect x="290" y="58" width="11" height="8" fill="rgba(222,170,87,.25)"/>
        <rect x="308" y="58" width="11" height="8" fill="rgba(222,170,87,.32)" class="w3"/>
        <rect x="254" y="74" width="11" height="8" fill="rgba(222,170,87,.16)"/>
        <rect x="272" y="74" width="11" height="8" fill="rgba(222,170,87,.27)" class="w2"/>
        <rect x="290" y="74" width="11" height="8" fill="rgba(222,170,87,.19)"/>
        <rect x="308" y="74" width="11" height="8" fill="rgba(222,170,87,.23)"/>
      </g>
      <!-- Four Seasons / SE Financial Center — stepped -->
      <g class="sk4">
        <rect x="344" y="68" width="68" height="297" fill="rgba(104,125,156,.22)" stroke="rgba(104,125,156,.33)" stroke-width=".7"/>
        <rect x="352" y="52" width="52" height="18" fill="rgba(104,125,156,.3)"/>
        <rect x="360" y="37" width="36" height="17" fill="rgba(104,125,156,.38)"/>
        <line x1="378" y1="37" x2="378" y2="16" stroke="rgba(222,170,87,.52)" stroke-width="2"/>
        <circle cx="378" cy="14" r="3" fill="rgba(222,170,87,.75)" class="w3"/>
        <line x1="358" y1="68" x2="358" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="378" y1="68" x2="378" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="400" y1="68" x2="400" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <rect x="350" y="82" width="9" height="7" fill="rgba(222,170,87,.22)" class="w1"/>
        <rect x="366" y="82" width="9" height="7" fill="rgba(222,170,87,.16)"/>
        <rect x="382" y="82" width="9" height="7" fill="rgba(222,170,87,.24)" class="w2"/>
      </g>
      <g class="sk5" opacity=".45"><rect x="424" y="168" width="42" height="197" fill="rgba(104,125,156,.16)"/></g>
      <rect class="scl" x="20" y="0" width="440" height="2" fill="rgba(222,170,87,.1)"/>
      <g style="animation:rise .6s .85s ease both;opacity:0">
        <rect x="178" y="340" width="124" height="20" rx="3" fill="rgba(17,24,39,.75)"/>
        <text x="240" y="354" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(222,170,87,.9)" font-weight="700" letter-spacing="1">MIAMI, FL</text>
      </g>
    </svg>