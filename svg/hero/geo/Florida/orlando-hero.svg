<svg width="480" height="400" viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes wglow{0%,100%{opacity:.25}50%{opacity:.65}}
        @keyframes scan{0%{transform:translateY(0);opacity:0}5%{opacity:.12}90%{opacity:.07}100%{transform:translateY(400px);opacity:0}}
        .sk1{animation:rise .55s .08s ease both;opacity:0}.sk2{animation:rise .55s .18s ease both;opacity:0}
        .sk3{animation:rise .55s .28s ease both;opacity:0}.sk4{animation:rise .55s .38s ease both;opacity:0}
        .sk5{animation:rise .55s .48s ease both;opacity:0}.sk6{animation:rise .55s .15s ease both;opacity:0}
        .w1{animation:wglow 3s ease infinite}.w2{animation:wglow 3s 1.2s ease infinite}.w3{animation:wglow 3s 2.1s ease infinite}
        .scl{animation:scan 8s 1s linear infinite}
      </style>
      <defs><pattern id="olgrid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0L0 0 0 24" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/></pattern></defs>
      <rect width="480" height="400" fill="url(#olgrid)"/>
      <rect x="20" y="365" width="440" height="3" fill="rgba(104,125,156,.2)"/>
      <line x1="20" y1="365" x2="460" y2="365" stroke="rgba(222,170,87,.2)" stroke-width="1"/>
      <g class="sk6" opacity=".42"><rect x="20" y="302" width="30" height="63" fill="rgba(104,125,156,.14)"/><rect x="54" y="285" width="26" height="80" fill="rgba(104,125,156,.16)"/></g>
      <!-- Orange County Courthouse — banded horizontal facade -->
      <g class="sk1">
        <rect x="88" y="185" width="52" height="180" fill="rgba(104,125,156,.2)" stroke="rgba(104,125,156,.3)" stroke-width=".7"/>
        <line x1="88" y1="205" x2="140" y2="205" stroke="rgba(104,125,156,.18)" stroke-width="2"/>
        <line x1="88" y1="225" x2="140" y2="225" stroke="rgba(104,125,156,.18)" stroke-width="2"/>
        <line x1="88" y1="245" x2="140" y2="245" stroke="rgba(104,125,156,.18)" stroke-width="2"/>
        <line x1="88" y1="265" x2="140" y2="265" stroke="rgba(104,125,156,.18)" stroke-width="2"/>
        <rect x="100" y="170" width="28" height="17" fill="rgba(104,125,156,.3)"/>
        <rect x="108" y="155" width="12" height="17" fill="rgba(104,125,156,.38)"/>
        <line x1="114" y1="125" x2="114" y2="155" stroke="rgba(222,170,87,.55)" stroke-width="2"/>
        <circle cx="114" cy="123" r="3" fill="rgba(222,170,87,.8)" class="w1"/>
        <rect x="94" y="195" width="8" height="6" fill="rgba(222,170,87,.2)" class="w2"/>
        <rect x="109" y="195" width="8" height="6" fill="rgba(222,170,87,.14)"/>
        <rect x="124" y="195" width="8" height="6" fill="rgba(222,170,87,.22)" class="w3"/>
      </g>
      <!-- 55W (55 West) — distinctive triangular notched corners -->
      <g class="sk2">
        <rect x="154" y="88" width="56" height="277" fill="rgba(104,125,156,.23)" stroke="rgba(104,125,156,.33)" stroke-width=".7"/>
        <!-- Notched corner details -->
        <polygon points="154,88 164,78 200,78 210,88" fill="rgba(104,125,156,.32)"/>
        <rect x="164" y="65" width="36" height="15" fill="rgba(104,125,156,.4)"/>
        <line x1="182" y1="50" x2="182" y2="65" stroke="rgba(222,170,87,.52)" stroke-width="2"/>
        <circle cx="182" cy="48" r="3" fill="rgba(222,170,87,.78)" class="w2"/>
        <line x1="165" y1="88" x2="165" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="182" y1="88" x2="182" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="199" y1="88" x2="199" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <rect x="159" y="102" width="9" height="7" fill="rgba(222,170,87,.22)" class="w1"/>
        <rect x="175" y="102" width="9" height="7" fill="rgba(222,170,87,.15)"/>
        <rect x="191" y="102" width="9" height="7" fill="rgba(222,170,87,.2)" class="w3"/>
        <rect x="159" y="118" width="9" height="7" fill="rgba(222,170,87,.15)"/>
        <rect x="175" y="118" width="9" height="7" fill="rgba(222,170,87,.24)" class="w2"/>
        <rect x="191" y="118" width="9" height="7" fill="rgba(222,170,87,.17)"/>
      </g>
      <!-- Truist Place (SunTrust) — tallest, flat topped with mechanical penthouse -->
      <g class="sk3">
        <rect x="226" y="44" width="88" height="321" fill="rgba(104,125,156,.29)" stroke="rgba(104,125,156,.44)" stroke-width=".7"/>
        <!-- Mechanical penthouse box on top -->
        <rect x="234" y="30" width="72" height="16" fill="rgba(104,125,156,.42)"/>
        <rect x="244" y="18" width="52" height="14" fill="rgba(104,125,156,.5)"/>
        <line x1="270" y1="4" x2="270" y2="18" stroke="rgba(222,170,87,.72)" stroke-width="2.8"/>
        <circle cx="270" cy="2" r="4" fill="rgba(222,170,87,.9)" class="w1"/>
        <line x1="240" y1="44" x2="240" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <line x1="270" y1="44" x2="270" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <line x1="300" y1="44" x2="300" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <rect x="232" y="58" width="11" height="8" fill="rgba(222,170,87,.28)" class="w2"/>
        <rect x="250" y="58" width="11" height="8" fill="rgba(222,170,87,.19)"/>
        <rect x="268" y="58" width="11" height="8" fill="rgba(222,170,87,.25)"/>
        <rect x="286" y="58" width="11" height="8" fill="rgba(222,170,87,.31)" class="w3"/>
        <rect x="232" y="74" width="11" height="8" fill="rgba(222,170,87,.16)"/>
        <rect x="250" y="74" width="11" height="8" fill="rgba(222,170,87,.26)" class="w1"/>
        <rect x="268" y="74" width="11" height="8" fill="rgba(222,170,87,.18)"/>
        <rect x="286" y="74" width="11" height="8" fill="rgba(222,170,87,.23)"/>
        <rect x="232" y="90" width="11" height="8" fill="rgba(222,170,87,.22)"/>
        <rect x="250" y="90" width="11" height="8" fill="rgba(222,170,87,.14)"/>
        <rect x="268" y="90" width="11" height="8" fill="rgba(222,170,87,.21)" class="w2"/>
        <rect x="286" y="90" width="11" height="8" fill="rgba(222,170,87,.17)"/>
      </g>
      <!-- Bank of America / Grand Bohemian area — mid-height glass -->
      <g class="sk4">
        <rect x="330" y="76" width="64" height="289" fill="rgba(104,125,156,.22)" stroke="rgba(104,125,156,.32)" stroke-width=".7"/>
        <rect x="338" y="62" width="48" height="16" fill="rgba(104,125,156,.3)"/>
        <rect x="346" y="48" width="32" height="16" fill="rgba(104,125,156,.38)"/>
        <line x1="362" y1="30" x2="362" y2="48" stroke="rgba(222,170,87,.5)" stroke-width="2"/>
        <circle cx="362" cy="28" r="3" fill="rgba(222,170,87,.74)" class="w3"/>
        <line x1="344" y1="76" x2="344" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="362" y1="76" x2="362" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="380" y1="76" x2="380" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <rect x="336" y="90" width="9" height="7" fill="rgba(222,170,87,.22)" class="w1"/>
        <rect x="352" y="90" width="9" height="7" fill="rgba(222,170,87,.15)"/>
        <rect x="368" y="90" width="9" height="7" fill="rgba(222,170,87,.24)" class="w2"/>
        <rect x="384" y="90" width="9" height="7" fill="rgba(222,170,87,.14)"/>
      </g>
      <g class="sk5" opacity=".45"><rect x="410" y="158" width="50" height="207" fill="rgba(104,125,156,.17)"/></g>
      <rect class="scl" x="20" y="0" width="440" height="2" fill="rgba(222,170,87,.1)"/>
      <g style="animation:rise .6s .85s ease both;opacity:0">
        <rect x="166" y="340" width="148" height="20" rx="3" fill="rgba(17,24,39,.75)"/>
        <text x="240" y="354" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(222,170,87,.9)" font-weight="700" letter-spacing="1">ORLANDO, FL</text>
      </g>
    </svg>