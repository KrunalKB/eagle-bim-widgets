<svg width="340" height="460" viewBox="0 0 340 460" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes drawState{from{stroke-dashoffset:2200}to{stroke-dashoffset:0}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
        @keyframes pls{0%,100%{r:5;opacity:.9}50%{r:7;opacity:.5}}
        .fl-border{stroke-dasharray:2200;stroke-dashoffset:2200;animation:drawState 2.4s .3s ease forwards}
        .fl-fill{opacity:0;animation:fadeIn .8s 2.2s ease forwards}
        .fl-grid{opacity:0;animation:fadeIn .6s 1.8s ease forwards}
        .c1{animation:popIn .4s 2.5s ease forwards;opacity:0}
        .c2{animation:popIn .4s 2.7s ease forwards;opacity:0}
        .c3{animation:popIn .4s 2.9s ease forwards;opacity:0}
        .c4{animation:popIn .4s 3.1s ease forwards;opacity:0}
        .c5{animation:popIn .4s 3.3s ease forwards;opacity:0}
        .cp{animation:pls 2.5s ease infinite}
      </style>
      <defs>
        <pattern id="flgrid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M20 0L0 0 0 20" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="340" height="460" fill="url(#flgrid)" class="fl-grid"/>

      <!-- Florida outline — peninsula shape pointing SE, panhandle extending west -->
      <path class="fl-fill"
        d="M30,80 L280,80 L285,90 L282,105 L278,118 L275,130
           L274,145 L276,160 L278,175 L276,190 L272,205 L268,218
           L262,232 L255,246 L248,260 L242,274 L238,288 L236,302
           L235,316 L236,330 L238,344 L242,358 L246,370 L248,382
           L244,394 L236,404 L224,412 L210,418 L196,420 L182,418
           L170,412 L162,404 L158,394 L160,382 L164,370 L162,356
           L158,342 L152,328 L146,314 L142,300 L140,286 L142,272
           L146,258 L144,244 L138,232 L130,220 L120,210 L108,200
           L96,192 L82,186 L68,182 L54,180 L42,180 L34,174 L28,165
           L26,152 L28,138 L30,124 L30,108 L30,80 Z"
        fill="rgba(104,125,156,.08)"/>
      <path class="fl-border"
        d="M30,80 L280,80 L285,90 L282,105 L278,118 L275,130
           L274,145 L276,160 L278,175 L276,190 L272,205 L268,218
           L262,232 L255,246 L248,260 L242,274 L238,288 L236,302
           L235,316 L236,330 L238,344 L242,358 L246,370 L248,382
           L244,394 L236,404 L224,412 L210,418 L196,420 L182,418
           L170,412 L162,404 L158,394 L160,382 L164,370 L162,356
           L158,342 L152,328 L146,314 L142,300 L140,286 L142,272
           L146,258 L144,244 L138,232 L130,220 L120,210 L108,200
           L96,192 L82,186 L68,182 L54,180 L42,180 L34,174 L28,165
           L26,152 L28,138 L30,124 L30,108 L30,80 Z"
        fill="none" stroke="rgba(104,125,156,.55)" stroke-width="2" stroke-linejoin="round"/>

      <!-- Miami — SE tip -->
      <g class="c1">
        <circle cx="210" cy="400" r="7" fill="#deaa57" class="cp"/>
        <circle cx="210" cy="400" r="3.5" fill="white"/>
        <rect x="120" y="392" width="52" height="18" rx="3" fill="rgba(17,24,39,.75)"/>
        <text x="146" y="405" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="white" font-weight="600">Miami</text>
      </g>

      <!-- Orlando — centre -->
      <g class="c2">
        <circle cx="210" cy="278" r="6" fill="#deaa57" class="cp"/>
        <circle cx="210" cy="278" r="3" fill="white"/>
        <rect x="220" y="270" width="54" height="18" rx="3" fill="rgba(17,24,39,.75)"/>
        <text x="247" y="283" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="white" font-weight="600">Orlando</text>
      </g>

      <!-- Tampa — west-central -->
      <g class="c3">
        <circle cx="148" cy="300" r="5.5" fill="rgba(222,170,87,.75)"/>
        <circle cx="148" cy="300" r="2.8" fill="white"/>
        <rect x="60" y="292" width="52" height="17" rx="3" fill="rgba(17,24,39,.68)"/>
        <text x="86" y="304" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,.9)" font-weight="500">Tampa</text>
      </g>

      <!-- Jacksonville — NE -->
      <g class="c4">
        <circle cx="252" cy="140" r="5.5" fill="rgba(222,170,87,.75)"/>
        <circle cx="252" cy="140" r="2.8" fill="white"/>
        <rect x="260" y="133" width="70" height="17" rx="3" fill="rgba(17,24,39,.68)"/>
        <text x="295" y="145" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,.9)" font-weight="500">Jacksonville</text>
      </g>

      <!-- Fort Lauderdale — SE coast above Miami -->
      <g class="c5">
        <circle cx="222" cy="368" r="5" fill="rgba(222,170,87,.65)"/>
        <circle cx="222" cy="368" r="2.5" fill="white"/>
        <rect x="232" y="361" width="78" height="17" rx="3" fill="rgba(17,24,39,.65)"/>
        <text x="271" y="373" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,.85)" font-weight="500">Ft. Lauderdale</text>
      </g>
    </svg>