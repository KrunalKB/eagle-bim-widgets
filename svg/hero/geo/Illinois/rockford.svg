<svg viewBox="0 0 500 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:500px;border-radius:12px;overflow:hidden">
  <defs>
    <linearGradient id="bg-gen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2233"/><stop offset="100%" stop-color="#243044"/></linearGradient>
  </defs>
  <style>
    .gen-room{fill:none;stroke:#687d9c;stroke-width:1.2;opacity:0;animation:roomIn .5s ease forwards}
    .gen-mep{stroke:#deaa57;stroke-width:1;fill:none;opacity:0;animation:mepIn .6s ease forwards}
    .gen-struct{stroke:#8a9db8;stroke-width:1.5;fill:none;opacity:0;animation:structIn .5s ease forwards}
    @keyframes roomIn{from{opacity:0}to{opacity:.7}}
    @keyframes mepIn{from{opacity:0}to{opacity:.6}}
    @keyframes structIn{from{opacity:0}to{opacity:.9}}
  </style>
  <rect width="500" height="340" fill="url(#bg-gen)"/>

  <!-- Grid lines -->
  <line x1="80" y1="60" x2="80" y2="280" stroke="#687d9c" stroke-width=".4" opacity=".3"/>
  <line x1="160" y1="60" x2="160" y2="280" stroke="#687d9c" stroke-width=".4" opacity=".3"/>
  <line x1="240" y1="60" x2="240" y2="280" stroke="#687d9c" stroke-width=".4" opacity=".3"/>
  <line x1="320" y1="60" x2="320" y2="280" stroke="#687d9c" stroke-width=".4" opacity=".3"/>
  <line x1="400" y1="60" x2="400" y2="280" stroke="#687d9c" stroke-width=".4" opacity=".3"/>
  <line x1="60" y1="100" x2="440" y2="100" stroke="#687d9c" stroke-width=".4" opacity=".3"/>
  <line x1="60" y1="160" x2="440" y2="160" stroke="#687d9c" stroke-width=".4" opacity=".3"/>
  <line x1="60" y1="220" x2="440" y2="220" stroke="#687d9c" stroke-width=".4" opacity=".3"/>

  <!-- Structural columns -->
  <circle cx="80" cy="100" r="5" class="gen-struct" style="animation-delay:.2s"/>
  <circle cx="160" cy="100" r="5" class="gen-struct" style="animation-delay:.3s"/>
  <circle cx="240" cy="100" r="5" class="gen-struct" style="animation-delay:.4s"/>
  <circle cx="320" cy="100" r="5" class="gen-struct" style="animation-delay:.5s"/>
  <circle cx="400" cy="100" r="5" class="gen-struct" style="animation-delay:.6s"/>
  <circle cx="80" cy="160" r="5" class="gen-struct" style="animation-delay:.3s"/>
  <circle cx="160" cy="160" r="5" class="gen-struct" style="animation-delay:.4s"/>
  <circle cx="240" cy="160" r="5" class="gen-struct" style="animation-delay:.5s"/>
  <circle cx="320" cy="160" r="5" class="gen-struct" style="animation-delay:.6s"/>
  <circle cx="400" cy="160" r="5" class="gen-struct" style="animation-delay:.7s"/>
  <circle cx="80" cy="220" r="5" class="gen-struct" style="animation-delay:.4s"/>
  <circle cx="160" cy="220" r="5" class="gen-struct" style="animation-delay:.5s"/>
  <circle cx="240" cy="220" r="5" class="gen-struct" style="animation-delay:.6s"/>
  <circle cx="320" cy="220" r="5" class="gen-struct" style="animation-delay:.7s"/>
  <circle cx="400" cy="220" r="5" class="gen-struct" style="animation-delay:.8s"/>

  <!-- Room outlines -->
  <rect x="82" y="102" width="76" height="56" class="gen-room" style="animation-delay:.8s"/>
  <rect x="162" y="102" width="76" height="56" class="gen-room" style="animation-delay:.9s"/>
  <rect x="242" y="102" width="76" height="56" class="gen-room" style="animation-delay:1s"/>
  <rect x="322" y="102" width="76" height="56" class="gen-room" style="animation-delay:1.1s"/>
  <rect x="82" y="162" width="76" height="56" class="gen-room" style="animation-delay:1s"/>
  <rect x="162" y="162" width="76" height="56" class="gen-room" style="animation-delay:1.1s"/>
  <rect x="242" y="162" width="76" height="56" class="gen-room" style="animation-delay:1.2s"/>
  <rect x="322" y="162" width="76" height="56" class="gen-room" style="animation-delay:1.3s"/>

  <!-- MEP runs -->
  <polyline points="82,130 158,130 158,162 322,162" class="gen-mep" style="animation-delay:1.4s"/>
  <polyline points="162,190 242,190 242,162 398,162" class="gen-mep" style="animation-delay:1.5s"/>
  <polyline points="120,102 120,100 320,100 320,102" class="gen-mep" style="animation-delay:1.6s"/>
  <circle cx="158" cy="162" r="4" fill="#deaa57" opacity="0" style="animation:mepIn .4s 1.7s ease forwards"/>
  <circle cx="242" cy="162" r="4" fill="#deaa57" opacity="0" style="animation:mepIn .4s 1.8s ease forwards"/>

  <!-- CLASH:0 badge -->
  <rect x="186" y="230" width="128" height="28" rx="4" fill="#1a2233" stroke="#deaa57" stroke-width="1.5" opacity="0" style="animation:roomIn .5s 2s ease forwards"/>
  <text x="250" y="249" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#deaa57" opacity="0" style="animation:mepIn .5s 2.2s ease forwards">CLASH DETECTED: 0</text>

  <!-- City label -->
  <text x="250" y="315" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#deaa57" opacity=".9">ROCKFORD, IL</text>
</svg>