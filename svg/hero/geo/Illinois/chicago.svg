<svg viewBox="0 0 500 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:500px;border-radius:12px;overflow:hidden">
  <defs>
    <linearGradient id="sky-chi" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2233"/><stop offset="100%" stop-color="#2d3d5c"/></linearGradient>
    <linearGradient id="bldg-chi" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#687d9c"/><stop offset="100%" stop-color="#4a5e78"/></linearGradient>
    <linearGradient id="gold-chi" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#deaa57"/><stop offset="100%" stop-color="#c8943d"/></linearGradient>
  </defs>
  <style>
    .chi-bldg{fill:url(#bldg-chi);stroke:#8a9db8;stroke-width:.5}
    .chi-win{fill:#deaa57;opacity:0;animation:winOn 0.4s ease forwards}
    .chi-Willis{animation:riseUp 1s 0.2s cubic-bezier(.22,1,.36,1) both}
    .chi-Hancock{animation:riseUp 1s 0.4s cubic-bezier(.22,1,.36,1) both}
    .chi-Trump{animation:riseUp 1s 0.6s cubic-bezier(.22,1,.36,1) both}
    .chi-Aqua{animation:riseUp 1s 0.8s cubic-bezier(.22,1,.36,1) both}
    @keyframes riseUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes winOn{from{opacity:0}to{opacity:0.85}}
  </style>
  <!-- Sky -->
  <rect width="500" height="340" fill="url(#sky-chi)"/>
  <!-- Water/ground -->
  <rect y="280" width="500" height="60" fill="#1a2233"/>
  <rect y="278" width="500" height="4" fill="#687d9c" opacity=".4"/>

  <!-- Willis Tower (bundled tubes step-back) -->
  <g class="chi-Willis">
    <rect x="185" y="80" width="42" height="200" class="chi-bldg"/>
    <rect x="189" y="60" width="18" height="60" class="chi-bldg"/>
    <rect x="209" y="70" width="14" height="50" class="chi-bldg"/>
    <rect x="189" y="40" width="10" height="30" class="chi-bldg"/>
    <!-- antenna -->
    <line x1="193" y1="40" x2="193" y2="10" stroke="#deaa57" stroke-width="1.5"/>
    <circle cx="193" cy="10" r="2" fill="#deaa57"/>
    <!-- windows -->
    <rect x="188" y="90" width="5" height="3" class="chi-win" style="animation-delay:1.5s"/>
    <rect x="195" y="90" width="5" height="3" class="chi-win" style="animation-delay:1.6s"/>
    <rect x="202" y="90" width="5" height="3" class="chi-win" style="animation-delay:1.7s"/>
    <rect x="188" y="100" width="5" height="3" class="chi-win" style="animation-delay:1.8s"/>
    <rect x="202" y="100" width="5" height="3" class="chi-win" style="animation-delay:1.9s"/>
  </g>

  <!-- John Hancock (X-brace) -->
  <g class="chi-Hancock">
    <rect x="120" y="120" width="48" height="160" class="chi-bldg"/>
    <!-- X-bracing -->
    <line x1="120" y1="120" x2="168" y2="280" stroke="#8a9db8" stroke-width="1.5" opacity=".6"/>
    <line x1="168" y1="120" x2="120" y2="280" stroke="#8a9db8" stroke-width="1.5" opacity=".6"/>
    <!-- twin antennae -->
    <line x1="133" y1="120" x2="130" y2="90" stroke="#deaa57" stroke-width="1.5"/>
    <line x1="155" y1="120" x2="158" y2="90" stroke="#deaa57" stroke-width="1.5"/>
    <circle cx="130" cy="90" r="2" fill="#deaa57"/>
    <circle cx="158" cy="90" r="2" fill="#deaa57"/>
    <rect x="124" y="130" width="5" height="3" class="chi-win" style="animation-delay:2s"/>
    <rect x="132" y="130" width="5" height="3" class="chi-win" style="animation-delay:2.1s"/>
    <rect x="140" y="140" width="5" height="3" class="chi-win" style="animation-delay:2.2s"/>
  </g>

  <!-- Trump Tower (setback glass) -->
  <g class="chi-Trump">
    <rect x="248" y="140" width="44" height="140" class="chi-bldg"/>
    <rect x="252" y="115" width="32" height="40" class="chi-bldg"/>
    <rect x="257" y="95" width="22" height="30" class="chi-bldg"/>
    <line x1="268" y1="95" x2="268" y2="70" stroke="#deaa57" stroke-width="1.5"/>
    <circle cx="268" cy="70" r="2" fill="#deaa57"/>
    <rect x="253" y="150" width="5" height="3" class="chi-win" style="animation-delay:2.3s"/>
    <rect x="261" y="150" width="5" height="3" class="chi-win" style="animation-delay:2.4s"/>
    <rect x="253" y="160" width="5" height="3" class="chi-win" style="animation-delay:2.5s"/>
  </g>

  <!-- Aqua Tower (wavy balconies) -->
  <g class="chi-Aqua">
    <rect x="308" y="155" width="38" height="125" class="chi-bldg"/>
    <!-- wavy balcony fins -->
    <path d="M308 165 Q318 160 327 165 Q336 170 346 165" fill="none" stroke="#deaa57" stroke-width="1.5" opacity=".7"/>
    <path d="M308 178 Q320 173 330 178 Q340 183 346 178" fill="none" stroke="#deaa57" stroke-width="1.5" opacity=".7"/>
    <path d="M308 191 Q316 186 326 191 Q336 196 346 191" fill="none" stroke="#deaa57" stroke-width="1.5" opacity=".7"/>
    <path d="M308 204 Q319 199 329 204 Q339 209 346 204" fill="none" stroke="#deaa57" stroke-width="1.5" opacity=".7"/>
    <rect x="312" y="170" width="4" height="3" class="chi-win" style="animation-delay:2.6s"/>
    <rect x="320" y="185" width="4" height="3" class="chi-win" style="animation-delay:2.7s"/>
  </g>

  <!-- Fill buildings -->
  <rect x="60" y="200" width="30" height="80" class="chi-bldg" style="animation:riseUp 1s 1s both"/>
  <rect x="355" y="210" width="35" height="70" class="chi-bldg" style="animation:riseUp 1s 1.1s both"/>
  <rect x="400" y="220" width="28" height="60" class="chi-bldg" style="animation:riseUp 1s 1.2s both"/>
  <rect x="80" y="220" width="20" height="60" fill="#3d5070" style="animation:riseUp 1s 1.3s both"/>
  <rect x="430" y="230" width="22" height="50" fill="#3d5070" style="animation:riseUp 1s 1.4s both"/>

  <!-- City label -->
  <text x="250" y="318" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#deaa57" opacity=".9">CHICAGO, IL</text>
</svg>