<svg width="420" height="380" viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes popUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes circuit{from{stroke-dashoffset:500}to{stroke-dashoffset:0}}
        @keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
        .fg1{animation:fadeIn .5s .2s ease both;opacity:0}
        .fg2{animation:fadeIn .5s .6s ease both;opacity:0}
        .fg3{animation:fadeIn .6s 1s ease both;opacity:0}
        .fc1{stroke-dasharray:500;stroke-dashoffset:500;animation:circuit .9s 1.3s ease forwards}
        .fc2{stroke-dasharray:500;stroke-dashoffset:500;animation:circuit .7s 1.7s ease forwards}
        .fp1{animation:popUp .4s 2.1s ease both;opacity:0}
        .fp2{animation:popUp .4s 2.4s ease both;opacity:0}
        .fp3{animation:popUp .4s 2.7s ease both;opacity:0}
      </style>
      <defs>
        <pattern id="sjgrid" width="22" height="22" patternUnits="userSpaceOnUse">
          <path d="M22 0L0 0 0 22" fill="none" stroke="rgba(104,125,156,.055)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="420" height="380" fill="url(#sjgrid)"/>
      <!-- Large tech campus floor plate -->
      <g class="fg1">
        <rect x="45" y="80" width="330" height="200" rx="3" fill="rgba(104,125,156,.07)" stroke="rgba(104,125,156,.25)" stroke-width="1.2"/>
        <!-- Internal floor plate grid -->
        <line x1="45" y1="147" x2="375" y2="147" stroke="rgba(104,125,156,.15)" stroke-width=".7"/>
        <line x1="45" y1="213" x2="375" y2="213" stroke="rgba(104,125,156,.15)" stroke-width=".7"/>
        <line x1="155" y1="80" x2="155" y2="280" stroke="rgba(104,125,156,.15)" stroke-width=".7"/>
        <line x1="265" y1="80" x2="265" y2="280" stroke="rgba(104,125,156,.15)" stroke-width=".7"/>
      </g>
      <!-- Tech campus modules -->
      <g class="fg2" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.22)" stroke-width=".6">
        <rect x="55" y="90" width="90" height="47"/>
        <rect x="165" y="90" width="90" height="47"/>
        <rect x="275" y="90" width="90" height="47"/>
        <rect x="55" y="157" width="90" height="46"/>
        <rect x="165" y="157" width="90" height="46"/>
        <rect x="275" y="157" width="90" height="46"/>
        <rect x="55" y="223" width="90" height="47"/>
        <rect x="165" y="223" width="90" height="47"/>
        <rect x="275" y="223" width="90" height="47"/>
      </g>
      <!-- Silicon Valley circuit-style routing -->
      <path d="M100 114 H155 V180 H265 V114 H375" class="fc1" stroke="rgba(222,170,87,.35)" stroke-width="1.5" fill="none"/>
      <path d="M45 180 H155 V246 H375" class="fc2" stroke="rgba(104,125,156,.4)" stroke-width="1.2" fill="none"/>
      <!-- Node dots -->
      <g class="fp1" fill="rgba(222,170,87,.75)">
        <circle cx="155" cy="114" r="4"/>
        <circle cx="265" cy="114" r="4"/>
        <circle cx="155" cy="180" r="4"/>
        <circle cx="265" cy="180" r="4"/>
        <circle cx="155" cy="246" r="3.5"/>
        <circle cx="265" cy="246" r="3.5"/>
      </g>
      <!-- T24 badge -->
      <g class="fp2">
        <rect x="130" y="52" width="80" height="18" rx="3" fill="rgba(222,170,87,.15)" stroke="rgba(222,170,87,.4)" stroke-width=".8"/>
        <text x="170" y="64" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(222,170,87,.9)" font-weight="700">TITLE 24 AWARE</text>
      </g>
      <!-- MEP tag -->
      <g class="fp3">
        <rect x="290" y="52" width="80" height="18" rx="3" fill="rgba(104,125,156,.15)" stroke="rgba(104,125,156,.3)" stroke-width=".8"/>
        <text x="330" y="64" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(104,125,156,.8)" font-weight="700">MEP BIM LOD 300</text>
      </g>
      <!-- Label -->
      <g class="fp3">
        <rect x="95" y="340" width="230" height="22" rx="3" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.2)" stroke-width=".5"/>
        <text x="210" y="355" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(104,125,156,.7)" font-weight="600" letter-spacing=".5">BIM SERVICES SAN JOSE · SILICON VALLEY</text>
      </g>
    </svg>