<svg width="420" height="380" viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes popUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes dash{from{stroke-dashoffset:400}to{stroke-dashoffset:0}}
        @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
        .fg1{animation:fadeIn .5s .2s ease both;opacity:0}
        .fg2{animation:fadeIn .5s .6s ease both;opacity:0}
        .fg3{animation:fadeIn .6s 1s ease both;opacity:0}
        .fd1{stroke-dasharray:400;stroke-dashoffset:400;animation:dash .8s 1.4s ease forwards}
        .fd2{stroke-dasharray:400;stroke-dashoffset:400;animation:dash .7s 1.8s ease forwards}
        .fp1{animation:popUp .4s 2.2s ease both;opacity:0}
        .fp2{animation:popUp .4s 2.5s ease both;opacity:0}
        .fp3{animation:popUp .4s 2.8s ease both;opacity:0}
      </style>
      <defs>
        <pattern id="sacgrid" width="22" height="22" patternUnits="userSpaceOnUse">
          <path d="M22 0L0 0 0 22" fill="none" stroke="rgba(104,125,156,.055)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="420" height="380" fill="url(#sacgrid)"/>
      <!-- State Capitol dome reference (simplified) -->
      <g class="fg1" opacity=".4">
        <rect x="172" y="200" width="76" height="120" fill="rgba(104,125,156,.15)" stroke="rgba(104,125,156,.25)" stroke-width=".8"/>
        <rect x="184" y="174" width="52" height="28" fill="rgba(104,125,156,.2)"/>
        <path d="M184 174 Q210 148 236 174Z" fill="rgba(104,125,156,.28)"/>
        <rect x="204" y="140" width="12" height="10" fill="rgba(104,125,156,.35)"/>
        <line x1="210" y1="140" x2="210" y2="120" stroke="rgba(222,170,87,.5)" stroke-width="2"/>
        <circle cx="210" cy="118" r="4" fill="rgba(222,170,87,.7)" style="animation:glow 3s ease infinite"/>
      </g>
      <!-- BIM model overlay grid -->
      <g class="fg2" stroke="rgba(104,125,156,.2)" stroke-width=".8" fill="none">
        <rect x="50" y="80" width="320" height="220" rx="2"/>
        <line x1="50" y1="155" x2="370" y2="155"/>
        <line x1="50" y1="230" x2="370" y2="230"/>
        <line x1="160" y1="80" x2="160" y2="300"/>
        <line x1="260" y1="80" x2="260" y2="300"/>
      </g>
      <!-- Level annotations -->
      <g class="fg3" fill="rgba(104,125,156,.6)" font-family="DM Sans,sans-serif" font-size="9">
        <text x="38" y="85" text-anchor="end">L3</text>
        <text x="38" y="160" text-anchor="end">L2</text>
        <text x="38" y="235" text-anchor="end">L1</text>
      </g>
      <!-- Coordinate lines -->
      <line x1="50" y1="80" x2="370" y2="80" class="fd1" stroke="rgba(222,170,87,.55)" stroke-width="1.2" fill="none"/>
      <line x1="50" y1="80" x2="50" y2="300" class="fd2" stroke="rgba(222,170,87,.45)" stroke-width="1.2" fill="none"/>
      <!-- Column markers -->
      <g class="fp1" fill="rgba(104,125,156,.75)">
        <rect x="46" y="76" width="8" height="8" rx="1"/>
        <rect x="156" y="76" width="8" height="8" rx="1"/>
        <rect x="256" y="76" width="8" height="8" rx="1"/>
        <rect x="366" y="76" width="8" height="8" rx="1"/>
      </g>
      <!-- CBC badge -->
      <g class="fp2">
        <rect x="135" y="52" width="74" height="18" rx="3" fill="rgba(222,170,87,.15)" stroke="rgba(222,170,87,.4)" stroke-width=".8"/>
        <text x="172" y="64" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(222,170,87,.9)" font-weight="700">CBC COMPLIANT</text>
      </g>
      <!-- Label -->
      <g class="fp3">
        <rect x="95" y="340" width="230" height="22" rx="3" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.2)" stroke-width=".5"/>
        <text x="210" y="355" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(104,125,156,.7)" font-weight="600" letter-spacing=".5">BIM SERVICES SACRAMENTO</text>
      </g>
    </svg>