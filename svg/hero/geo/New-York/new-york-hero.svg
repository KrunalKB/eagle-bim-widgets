        <rect x="326" y="202" width="50" height="17" rx="3" fill="rgba(17,24,39,.68)"/>
        <text x="351" y="214" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,.9)" font-weight="500">Albany</text>
      </g>

      <!-- Rochester — W central -->
      <g class="c4">
        <circle cx="80" cy="165" r="5" fill="rgba(222,170,87,.7)"/>
        <circle cx="80" cy="165" r="2.5" fill="white"/>
        <rect x="88" y="157" width="65" height="17" rx="3" fill="rgba(17,24,39,.65)"/>
        <text x="120" y="169" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,.88)" font-weight="500">Rochester</text>
      </g>

      <!-- Syracuse — centre -->
      <g class="c5">
        <circle cx="200" cy="175" r="5" fill="rgba(222,170,87,.65)"/>
