      <!-- NYC — SE corner -->
      <g class="c1">
        <circle cx="258" cy="340" r="7" fill="#deaa57" class="cp"/>
        <circle cx="258" cy="340" r="3.5" fill="white"/>
        <rect x="150" y="332" width="90" height="18" rx="3" fill="rgba(17,24,39,.78)"/>
        <text x="195" y="345" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="white" font-weight="700">New York City</text>
      </g>

      <!-- Buffalo — W edge -->
      <g class="c2">
        <circle cx="48" cy="232" r="5.5" fill="rgba(222,170,87,.8)"/>
        <circle cx="48" cy="232" r="2.8" fill="white"/>
        <rect x="56" y="224" width="54" height="17" rx="3" fill="rgba(17,24,39,.72)"/>
        <text x="83" y="236" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,.95)" font-weight="500">Buffalo</text>
      </g>

      <!-- Albany — E central -->
      <g class="c3">
        <circle cx="318" cy="210" r="5.5" fill="rgba(222,170,87,.75)"/>
