<svg width="420" height="380" viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes drawState{from{stroke-dashoffset:2000}to{stroke-dashoffset:0}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
        @keyframes pls{0%,100%{r:5;opacity:.9}50%{r:7;opacity:.5}}
        .ny-border{stroke-dasharray:2000;stroke-dashoffset:2000;animation:drawState 2.4s .3s ease forwards}
        .ny-fill{opacity:0;animation:fadeIn .8s 2.2s ease forwards}
        .ny-grid{opacity:0;animation:fadeIn .6s 1.8s ease forwards}
        .c1{animation:popIn .4s 2.5s ease forwards;opacity:0}
        .c2{animation:popIn .4s 2.7s ease forwards;opacity:0}
        .c3{animation:popIn .4s 2.9s ease forwards;opacity:0}
        .c4{animation:popIn .4s 3.1s ease forwards;opacity:0}
        .c5{animation:popIn .4s 3.3s ease forwards;opacity:0}
        .cp{animation:pls 2.5s ease infinite}
      </style>
      <defs>
        <pattern id="nygrid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M20 0L0 0 0 20" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="420" height="380" fill="url(#nygrid)" class="ny-grid"/>
      <!-- NY shape: western edge, south border, Hudson Valley, NYC at SE tip, LI pointing E, then north back up -->
      <path class="ny-fill"
