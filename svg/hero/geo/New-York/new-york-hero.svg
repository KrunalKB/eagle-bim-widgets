           L370,132 L368,148 L366,162 L362,175 L355,186
           L346,196 L335,204 L325,212 L318,222 L315,234
           L316,248 L320,262 L322,274 L318,285 L308,293
           L295,298 L282,300 L275,306 L272,316 L275,328
           L278,340 L278,352 L272,360 L262,364 L250,362
           L240,356 L235,345 L238,333 L244,323
           L240,312 L230,302 L218,296 L205,295
           L195,298 L188,306 L186,318 L190,330
           L194,342 L190,350 L180,354 L168,350
