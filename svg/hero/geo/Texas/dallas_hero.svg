<svg width="480" height="400" viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes wglow{0%,100%{opacity:.25}50%{opacity:.65}}
        @keyframes scanline{0%{transform:translateY(0);opacity:0}5%{opacity:.12}90%{opacity:.07}100%{transform:translateY(400px);opacity:0}}
        .sk1{animation:rise .55s .1s ease both;opacity:0}.sk2{animation:rise .55s .2s ease both;opacity:0}
        .sk3{animation:rise .55s .3s ease both;opacity:0}.sk4{animation:rise .55s .4s ease both;opacity:0}
        .sk5{animation:rise .55s .5s ease both;opacity:0}.sk6{animation:rise .55s .35s ease both;opacity:0}
        .sk7{animation:rise .55s .15s ease both;opacity:0}
        .w1{animation:wglow 3s ease infinite}.w2{animation:wglow 3s 1.2s ease infinite}.w3{animation:wglow 3s 2.1s ease infinite}
        .scan{animation:scanline 8s 1s linear infinite}
      </style>
      <defs>
        <pattern id="dgrid" width="24" height="24" patternUnits="userSpaceOnUse">
          <path d="M24 0L0 0 0 24" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="480" height="400" fill="url(#dgrid)"/>
      <rect x="20" y="365" width="440" height="3" fill="rgba(104,125,156,.2)"/>
      <line x1="20" y1="365" x2="460" y2="365" stroke="rgba(222,170,87,.2)" stroke-width="1"/>

      <!-- Far left filler -->
      <g class="sk7" opacity=".45">
        <rect x="20" y="300" width="36" height="65" fill="rgba(104,125,156,.14)"/>
        <rect x="60" y="280" width="24" height="85" fill="rgba(104,125,156,.16)"/>
      </g>

      <!-- Reunion Tower — distinctive globe on shaft -->
      <g class="sk1">
        <rect x="96" y="220" width="18" height="145" fill="rgba(104,125,156,.26)" stroke="rgba(104,125,156,.36)" stroke-width=".6"/>
        <rect x="102" y="158" width="6" height="64" fill="rgba(104,125,156,.32)"/>
        <!-- Globe -->
        <ellipse cx="105" cy="148" rx="24" ry="16" fill="rgba(104,125,156,.2)" stroke="rgba(104,125,156,.4)" stroke-width="1.2"/>
        <ellipse cx="105" cy="148" rx="16" ry="11" fill="rgba(104,125,156,.3)"/>
        <circle cx="105" cy="148" r="4.5" fill="rgba(222,170,87,.82)" class="w1"/>
        <line x1="81" y1="148" x2="129" y2="148" stroke="rgba(104,125,156,.2)" stroke-width=".6"/>
        <line x1="105" y1="130" x2="105" y2="166" stroke="rgba(104,125,156,.2)" stroke-width=".6"/>
        <rect x="93" y="252" width="7" height="5" fill="rgba(222,170,87,.2)" class="w2"/>
        <rect x="108" y="252" width="7" height="5" fill="rgba(222,170,87,.15)"/>
        <rect x="93" y="267" width="7" height="5" fill="rgba(222,170,87,.15)"/>
        <rect x="108" y="267" width="7" height="5" fill="rgba(222,170,87,.22)" class="w3"/>
      </g>

      <!-- Slender commercial left -->
      <g class="sk2">
        <rect x="134" y="95" width="50" height="270" fill="rgba(104,125,156,.2)" stroke="rgba(104,125,156,.3)" stroke-width=".7"/>
        <rect x="142" y="83" width="34" height="14" fill="rgba(104,125,156,.3)"/>
        <rect x="150" y="69" width="18" height="16" fill="rgba(104,125,156,.38)"/>
        <line x1="159" y1="51" x2="159" y2="69" stroke="rgba(222,170,87,.5)" stroke-width="2"/>
        <line x1="148" y1="95" x2="148" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="159" y1="95" x2="159" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="176" y1="95" x2="176" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <rect x="139" y="109" width="9" height="7" fill="rgba(222,170,87,.22)" class="w1"/>
        <rect x="155" y="109" width="9" height="7" fill="rgba(222,170,87,.15)"/>
        <rect x="139" y="125" width="9" height="7" fill="rgba(222,170,87,.16)"/>
        <rect x="155" y="125" width="9" height="7" fill="rgba(222,170,87,.24)" class="w2"/>
        <rect x="139" y="141" width="9" height="7" fill="rgba(222,170,87,.2)"/>
        <rect x="155" y="141" width="9" height="7" fill="rgba(222,170,87,.14)"/>
      </g>

      <!-- Bank of America Plaza — tallest, green spire (BofA signature) -->
      <g class="sk3">
        <rect x="196" y="48" width="80" height="317" fill="rgba(104,125,156,.27)" stroke="rgba(104,125,156,.42)" stroke-width=".7"/>
        <polygon points="196,48 236,18 276,48" fill="rgba(104,125,156,.4)"/>
        <line x1="236" y1="18" x2="236" y2="-2" stroke="rgba(104,200,104,.75)" stroke-width="2.6"/>
        <circle cx="236" cy="-4" r="4" fill="rgba(104,220,104,.9)" class="w1"/>
        <!-- Green glow band at crown -->
        <rect x="196" y="48" width="80" height="7" fill="rgba(104,175,104,.12)"/>
        <line x1="216" y1="48" x2="216" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <line x1="236" y1="48" x2="236" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <line x1="256" y1="48" x2="256" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <rect x="202" y="62" width="10" height="7" fill="rgba(222,170,87,.26)" class="w2"/>
        <rect x="220" y="62" width="10" height="7" fill="rgba(222,170,87,.17)"/>
        <rect x="238" y="62" width="10" height="7" fill="rgba(222,170,87,.24)" class="w3"/>
        <rect x="256" y="62" width="10" height="7" fill="rgba(222,170,87,.19)"/>
        <rect x="202" y="78" width="10" height="7" fill="rgba(222,170,87,.15)"/>
        <rect x="220" y="78" width="10" height="7" fill="rgba(222,170,87,.25)" class="w1"/>
        <rect x="238" y="78" width="10" height="7" fill="rgba(222,170,87,.18)"/>
        <rect x="256" y="78" width="10" height="7" fill="rgba(222,170,87,.23)"/>
        <rect x="202" y="94" width="10" height="7" fill="rgba(222,170,87,.22)"/>
        <rect x="220" y="94" width="10" height="7" fill="rgba(222,170,87,.15)"/>
        <rect x="238" y="94" width="10" height="7" fill="rgba(222,170,87,.28)" class="w2"/>
        <rect x="256" y="94" width="10" height="7" fill="rgba(222,170,87,.16)"/>
        <rect x="202" y="110" width="10" height="7" fill="rgba(222,170,87,.17)"/>
        <rect x="220" y="110" width="10" height="7" fill="rgba(222,170,87,.24)" class="w3"/>
        <rect x="238" y="110" width="10" height="7" fill="rgba(222,170,87,.14)"/>
        <rect x="256" y="110" width="10" height="7" fill="rgba(222,170,87,.21)"/>
      </g>

      <!-- Renaissance Tower — stepped setbacks, centre showpiece -->
      <g class="sk4">
        <rect x="292" y="55" width="94" height="310" fill="rgba(104,125,156,.29)" stroke="rgba(104,125,156,.44)" stroke-width=".7"/>
        <rect x="304" y="41" width="70" height="16" fill="rgba(104,125,156,.38)"/>
        <rect x="316" y="27" width="46" height="16" fill="rgba(104,125,156,.46)"/>
        <rect x="328" y="13" width="22" height="16" fill="rgba(104,125,156,.54)"/>
        <line x1="339" y1="-7" x2="339" y2="13" stroke="rgba(222,170,87,.74)" stroke-width="2.8"/>
        <circle cx="339" cy="-9" r="4.2" fill="rgba(222,170,87,.9)" class="w1"/>
        <rect x="298" y="69" width="11" height="8" fill="rgba(222,170,87,.28)" class="w2"/>
        <rect x="316" y="69" width="11" height="8" fill="rgba(222,170,87,.19)"/>
        <rect x="334" y="69" width="11" height="8" fill="rgba(222,170,87,.25)"/>
        <rect x="352" y="69" width="11" height="8" fill="rgba(222,170,87,.31)" class="w3"/>
        <rect x="370" y="69" width="11" height="8" fill="rgba(222,170,87,.16)"/>
        <rect x="298" y="86" width="11" height="8" fill="rgba(222,170,87,.16)"/>
        <rect x="316" y="86" width="11" height="8" fill="rgba(222,170,87,.26)" class="w1"/>
        <rect x="334" y="86" width="11" height="8" fill="rgba(222,170,87,.18)"/>
        <rect x="352" y="86" width="11" height="8" fill="rgba(222,170,87,.23)"/>
        <rect x="370" y="86" width="11" height="8" fill="rgba(222,170,87,.13)"/>
        <rect x="298" y="103" width="11" height="8" fill="rgba(222,170,87,.24)" class="w2"/>
        <rect x="316" y="103" width="11" height="8" fill="rgba(222,170,87,.14)"/>
        <rect x="334" y="103" width="11" height="8" fill="rgba(222,170,87,.21)"/>
        <rect x="352" y="103" width="11" height="8" fill="rgba(222,170,87,.17)"/>
        <rect x="370" y="103" width="11" height="8" fill="rgba(222,170,87,.26)" class="w3"/>
        <rect x="298" y="120" width="11" height="8" fill="rgba(222,170,87,.17)"/>
        <rect x="316" y="120" width="11" height="8" fill="rgba(222,170,87,.23)"/>
        <rect x="334" y="120" width="11" height="8" fill="rgba(222,170,87,.18)"/>
        <rect x="352" y="120" width="11" height="8" fill="rgba(222,170,87,.27)" class="w1"/>
        <rect x="370" y="120" width="11" height="8" fill="rgba(222,170,87,.14)"/>
      </g>

      <!-- AT&T / Whitacre Tower — stepped like classic AT&T building -->
      <g class="sk5">
        <rect x="402" y="70" width="72" height="295" fill="rgba(104,125,156,.23)" stroke="rgba(104,125,156,.34)" stroke-width=".7"/>
        <rect x="410" y="56" width="56" height="16" fill="rgba(104,125,156,.32)"/>
        <rect x="418" y="40" width="40" height="18" fill="rgba(104,125,156,.4)"/>
        <rect x="426" y="24" width="24" height="18" fill="rgba(104,125,156,.48)"/>
        <rect x="406" y="84" width="9" height="7" fill="rgba(222,170,87,.24)" class="w1"/>
        <rect x="422" y="84" width="9" height="7" fill="rgba(222,170,87,.16)"/>
        <rect x="438" y="84" width="9" height="7" fill="rgba(222,170,87,.26)" class="w2"/>
        <rect x="454" y="84" width="9" height="7" fill="rgba(222,170,87,.17)"/>
        <rect x="406" y="100" width="9" height="7" fill="rgba(222,170,87,.16)"/>
        <rect x="422" y="100" width="9" height="7" fill="rgba(222,170,87,.24)" class="w3"/>
        <rect x="438" y="100" width="9" height="7" fill="rgba(222,170,87,.18)"/>
        <rect x="454" y="100" width="9" height="7" fill="rgba(222,170,87,.27)"/>
      </g>

      <!-- Right filler -->
      <g class="sk6" opacity=".5">
        <rect x="460" y="155" width="20" height="210" fill="rgba(104,125,156,.16)"/>
      </g>

      <!-- Scan line -->
      <rect class="scan" x="20" y="0" width="440" height="2" fill="rgba(222,170,87,.1)"/>

      <!-- City label -->
      <g style="animation:rise .6s .85s ease both;opacity:0">
        <rect x="196" y="340" width="108" height="20" rx="3" fill="rgba(17,24,39,.75)"/>
        <text x="250" y="354" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(222,170,87,.9)" font-weight="700" letter-spacing="1">DALLAS, TEXAS</text>
      </g>
    </svg>