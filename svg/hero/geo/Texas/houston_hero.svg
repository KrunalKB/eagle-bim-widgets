<svg width="480" height="400" viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes wglow{0%,100%{opacity:.25}50%{opacity:.65}}
        @keyframes scanline{0%{transform:translateY(0);opacity:0}5%{opacity:.15}90%{opacity:.08}100%{transform:translateY(400px);opacity:0}}
        .sk1{animation:rise .55s .1s ease both;opacity:0}.sk2{animation:rise .55s .2s ease both;opacity:0}
        .sk3{animation:rise .55s .3s ease both;opacity:0}.sk4{animation:rise .55s .4s ease both;opacity:0}
        .sk5{animation:rise .55s .5s ease both;opacity:0}.sk6{animation:rise .55s .35s ease both;opacity:0}
        .sk7{animation:rise .55s .25s ease both;opacity:0}.sk8{animation:rise .55s .45s ease both;opacity:0}
        .w1{animation:wglow 3s ease infinite}.w2{animation:wglow 3s 1.2s ease infinite}.w3{animation:wglow 3s 2.1s ease infinite}
        .scan{animation:scanline 8s 1s linear infinite}
      </style>
      <!-- Grid background -->
      <defs>
        <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
          <path d="M24 0L0 0 0 24" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="480" height="400" fill="url(#grid)"/>

      <!-- Ground -->
      <rect x="20" y="365" width="440" height="3" fill="rgba(104,125,156,.2)"/>
      <line x1="20" y1="365" x2="460" y2="365" stroke="rgba(222,170,87,.2)" stroke-width="1"/>

      <!-- Far left filler -->
      <g class="sk1" opacity=".5">
        <rect x="20" y="318" width="38" height="47" fill="rgba(104,125,156,.15)" stroke="rgba(104,125,156,.22)" stroke-width=".6"/>
        <rect x="64" y="304" width="28" height="61" fill="rgba(104,125,156,.17)" stroke="rgba(104,125,156,.24)" stroke-width=".6"/>
      </g>

      <!-- Building A — tall left anchor -->
      <g class="sk2">
        <rect x="100" y="148" width="58" height="217" fill="rgba(104,125,156,.18)" stroke="rgba(104,125,156,.3)" stroke-width=".7"/>
        <rect x="107" y="137" width="44" height="13" fill="rgba(104,125,156,.28)"/>
        <rect x="116" y="122" width="26" height="17" fill="rgba(104,125,156,.36)"/>
        <line x1="129" y1="104" x2="129" y2="122" stroke="rgba(222,170,87,.55)" stroke-width="2"/>
        <circle cx="129" cy="102" r="2.8" fill="rgba(222,170,87,.75)" class="w1"/>
        <rect x="106" y="162" width="8" height="6" fill="rgba(222,170,87,.22)" class="w2"/><rect x="121" y="162" width="8" height="6" fill="rgba(222,170,87,.15)"/><rect x="136" y="162" width="8" height="6" fill="rgba(222,170,87,.2)" class="w3"/>
        <rect x="106" y="176" width="8" height="6" fill="rgba(222,170,87,.15)"/><rect x="121" y="176" width="8" height="6" fill="rgba(222,170,87,.22)" class="w1"/><rect x="136" y="176" width="8" height="6" fill="rgba(222,170,87,.18)"/>
        <rect x="106" y="190" width="8" height="6" fill="rgba(222,170,87,.2)"/><rect x="121" y="190" width="8" height="6" fill="rgba(222,170,87,.15)"/><rect x="136" y="190" width="8" height="6" fill="rgba(222,170,87,.24)" class="w2"/>
        <rect x="106" y="204" width="8" height="6" fill="rgba(222,170,87,.17)"/><rect x="121" y="204" width="8" height="6" fill="rgba(222,170,87,.21)"/><rect x="136" y="204" width="8" height="6" fill="rgba(222,170,87,.15)"/>
      </g>

      <!-- Building B — tallest, centre-left -->
      <g class="sk3">
        <rect x="164" y="62" width="78" height="303" fill="rgba(104,125,156,.22)" stroke="rgba(104,125,156,.35)" stroke-width=".7"/>
        <polygon points="164,62 203,32 242,62" fill="rgba(104,125,156,.35)"/>
        <line x1="203" y1="32" x2="203" y2="12" stroke="rgba(222,170,87,.65)" stroke-width="2.5"/>
        <circle cx="203" cy="10" r="3.5" fill="rgba(222,170,87,.85)" class="w1"/>
        <line x1="185" y1="62" x2="185" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <line x1="203" y1="62" x2="203" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <line x1="224" y1="62" x2="224" y2="365" stroke="rgba(104,125,156,.08)" stroke-width=".5"/>
        <rect x="170" y="76" width="9" height="7" fill="rgba(222,170,87,.26)" class="w2"/><rect x="186" y="76" width="9" height="7" fill="rgba(222,170,87,.17)"/><rect x="202" y="76" width="9" height="7" fill="rgba(222,170,87,.24)" class="w3"/><rect x="218" y="76" width="9" height="7" fill="rgba(222,170,87,.18)"/>
        <rect x="170" y="92" width="9" height="7" fill="rgba(222,170,87,.15)"/><rect x="186" y="92" width="9" height="7" fill="rgba(222,170,87,.25)" class="w1"/><rect x="202" y="92" width="9" height="7" fill="rgba(222,170,87,.18)"/><rect x="218" y="92" width="9" height="7" fill="rgba(222,170,87,.24)"/>
        <rect x="170" y="108" width="9" height="7" fill="rgba(222,170,87,.22)"/><rect x="186" y="108" width="9" height="7" fill="rgba(222,170,87,.15)"/><rect x="202" y="108" width="9" height="7" fill="rgba(222,170,87,.28)" class="w2"/><rect x="218" y="108" width="9" height="7" fill="rgba(222,170,87,.17)"/>
        <rect x="170" y="124" width="9" height="7" fill="rgba(222,170,87,.17)"/><rect x="186" y="124" width="9" height="7" fill="rgba(222,170,87,.24)" class="w3"/><rect x="202" y="124" width="9" height="7" fill="rgba(222,170,87,.15)"/><rect x="218" y="124" width="9" height="7" fill="rgba(222,170,87,.22)"/>
      </g>

      <!-- Building C — stepped centre showpiece -->
      <g class="sk4">
        <rect x="248" y="52" width="90" height="313" fill="rgba(104,125,156,.26)" stroke="rgba(104,125,156,.4)" stroke-width=".7"/>
        <rect x="258" y="38" width="70" height="16" fill="rgba(104,125,156,.38)"/>
        <rect x="268" y="24" width="50" height="16" fill="rgba(104,125,156,.46)"/>
        <rect x="278" y="10" width="30" height="16" fill="rgba(104,125,156,.54)"/>
        <line x1="293" y1="-6" x2="293" y2="10" stroke="rgba(222,170,87,.72)" stroke-width="2.8"/>
        <circle cx="293" cy="-8" r="4" fill="rgba(222,170,87,.9)" class="w1"/>
        <rect x="254" y="66" width="10" height="8" fill="rgba(222,170,87,.28)" class="w2"/><rect x="272" y="66" width="10" height="8" fill="rgba(222,170,87,.18)"/><rect x="290" y="66" width="10" height="8" fill="rgba(222,170,87,.25)"/><rect x="308" y="66" width="10" height="8" fill="rgba(222,170,87,.3)" class="w3"/>
        <rect x="254" y="83" width="10" height="8" fill="rgba(222,170,87,.16)"/><rect x="272" y="83" width="10" height="8" fill="rgba(222,170,87,.27)" class="w1"/><rect x="290" y="83" width="10" height="8" fill="rgba(222,170,87,.19)"/><rect x="308" y="83" width="10" height="8" fill="rgba(222,170,87,.25)"/>
        <rect x="254" y="100" width="10" height="8" fill="rgba(222,170,87,.25)" class="w2"/><rect x="272" y="100" width="10" height="8" fill="rgba(222,170,87,.15)"/><rect x="290" y="100" width="10" height="8" fill="rgba(222,170,87,.23)"/><rect x="308" y="100" width="10" height="8" fill="rgba(222,170,87,.18)"/>
        <rect x="254" y="117" width="10" height="8" fill="rgba(222,170,87,.17)"/><rect x="272" y="117" width="10" height="8" fill="rgba(222,170,87,.26)" class="w3"/><rect x="290" y="117" width="10" height="8" fill="rgba(222,170,87,.21)"/><rect x="308" y="117" width="10" height="8" fill="rgba(222,170,87,.29)"/>
      </g>

      <!-- Building D — Williams Tower glass -->
      <g class="sk5">
        <rect x="344" y="108" width="62" height="257" fill="rgba(104,125,156,.17)" stroke="rgba(104,125,156,.26)" stroke-width=".7"/>
        <rect x="351" y="96" width="48" height="14" fill="rgba(104,125,156,.26)"/>
        <rect x="358" y="82" width="34" height="16" fill="rgba(104,125,156,.33)"/>
        <line x1="375" y1="64" x2="375" y2="82" stroke="rgba(222,170,87,.46)" stroke-width="1.8"/>
        <line x1="357" y1="108" x2="357" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="375" y1="108" x2="375" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <line x1="393" y1="108" x2="393" y2="365" stroke="rgba(104,125,156,.07)" stroke-width=".5"/>
        <rect x="350" y="122" width="8" height="6" fill="rgba(222,170,87,.2)" class="w1"/><rect x="364" y="122" width="8" height="6" fill="rgba(222,170,87,.14)"/><rect x="378" y="122" width="8" height="6" fill="rgba(222,170,87,.24)" class="w3"/><rect x="394" y="122" width="8" height="6" fill="rgba(222,170,87,.17)"/>
        <rect x="350" y="137" width="8" height="6" fill="rgba(222,170,87,.17)"/><rect x="364" y="137" width="8" height="6" fill="rgba(222,170,87,.22)" class="w2"/><rect x="378" y="137" width="8" height="6" fill="rgba(222,170,87,.14)"/><rect x="394" y="137" width="8" height="6" fill="rgba(222,170,87,.2)"/>
      </g>

      <!-- Building E — right anchor -->
      <g class="sk6">
        <rect x="412" y="170" width="50" height="195" fill="rgba(104,125,156,.15)" stroke="rgba(104,125,156,.22)" stroke-width=".7"/>
        <rect x="418" y="158" width="38" height="14" fill="rgba(104,125,156,.22)"/>
        <rect x="424" y="144" width="26" height="16" fill="rgba(104,125,156,.29)"/>
        <rect x="416" y="184" width="8" height="6" fill="rgba(222,170,87,.18)" class="w1"/><rect x="430" y="184" width="8" height="6" fill="rgba(222,170,87,.12)"/><rect x="444" y="184" width="8" height="6" fill="rgba(222,170,87,.2)" class="w2"/>
        <rect x="416" y="199" width="8" height="6" fill="rgba(222,170,87,.14)"/><rect x="430" y="199" width="8" height="6" fill="rgba(222,170,87,.19)" class="w3"/><rect x="444" y="199" width="8" height="6" fill="rgba(222,170,87,.13)"/>
      </g>

      <!-- Scan line effect -->
      <rect class="scan" x="20" y="0" width="440" height="2" fill="rgba(222,170,87,.12)"/>

      <!-- Location pin + label -->
      <g style="animation:rise .6s .8s ease both;opacity:0">
        <circle cx="293" cy="310" r="22" fill="rgba(222,170,87,.1)" stroke="rgba(222,170,87,.3)" stroke-width="1"/>
        <path d="M293 298 C289 298 286 301 286 305 C286 311 293 318 293 318 C293 318 300 311 300 305 C300 301 297 298 293 298Z" fill="#deaa57" opacity=".8"/>
        <circle cx="293" cy="305" r="2.5" fill="white"/>
        <rect x="240" y="328" width="106" height="22" rx="3" fill="rgba(104,125,156,.12)" stroke="rgba(104,125,156,.2)" stroke-width=".5"/>
        <text x="293" y="343" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(104,125,156,.8)" font-weight="600" letter-spacing="1">HOUSTON, TEXAS</text>
      </g>
    </svg>