<svg width="420" height="380" viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes drawLine{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
        @keyframes popUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
        .g1{animation:fadeIn .5s .2s ease both;opacity:0}
        .g2{animation:fadeIn .5s .5s ease both;opacity:0}
        .g3{animation:fadeIn .5s .8s ease both;opacity:0}
        .g4{animation:fadeIn .5s 1.1s ease both;opacity:0}
        .l1{stroke-dasharray:600;stroke-dashoffset:600;animation:drawLine .8s 1.4s ease forwards}
        .l2{stroke-dasharray:600;stroke-dashoffset:600;animation:drawLine .6s 1.8s ease forwards}
        .l3{stroke-dasharray:600;stroke-dashoffset:600;animation:drawLine .6s 2.1s ease forwards}
        .n1{animation:popUp .4s 2.4s ease both;opacity:0}
        .n2{animation:popUp .4s 2.6s ease both;opacity:0}
        .n3{animation:popUp .4s 2.8s ease both;opacity:0}
        .dot{animation:pulse 2s ease infinite}
      </style>
      <defs>
        <pattern id="sgrid" width="22" height="22" patternUnits="userSpaceOnUse">
          <path d="M22 0L0 0 0 22" fill="none" stroke="rgba(104,125,156,.055)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="420" height="380" fill="url(#sgrid)"/>

      <!-- Floor plan outline -->
      <g class="g1">
        <rect x="60" y="60" width="300" height="220" rx="2" fill="rgba(104,125,156,.07)" stroke="rgba(104,125,156,.3)" stroke-width="1.5"/>
        <!-- Internal walls -->
        <line x1="180" y1="60" x2="180" y2="200" stroke="rgba(104,125,156,.25)" stroke-width="1.2"/>
        <line x1="60" y1="170" x2="280" y2="170" stroke="rgba(104,125,156,.25)" stroke-width="1.2"/>
        <line x1="280" y1="130" x2="280" y2="280" stroke="rgba(104,125,156,.25)" stroke-width="1.2"/>
      </g>

      <!-- Room fills -->
      <g class="g2">
        <rect x="62" y="62" width="116" height="106" fill="rgba(104,125,156,.06)"/>
        <rect x="62" y="172" width="116" height="106" fill="rgba(222,170,87,.05)"/>
        <rect x="182" y="62" width="96" height="106" fill="rgba(104,125,156,.08)"/>
        <rect x="182" y="172" width="96" height="106" fill="rgba(104,125,156,.04)"/>
        <rect x="282" y="62" width="76" height="216" fill="rgba(222,170,87,.07)"/>
      </g>

      <!-- Dimension lines -->
      <g class="g3" stroke="rgba(104,125,156,.35)" stroke-width=".8" fill="none">
        <line x1="60" y1="310" x2="360" y2="310"/>
        <line x1="60" y1="305" x2="60" y2="315"/>
        <line x1="360" y1="305" x2="360" y2="315"/>
        <line x1="400" y1="60" x2="400" y2="280"/>
        <line x1="395" y1="60" x2="405" y2="60"/>
        <line x1="395" y1="280" x2="405" y2="280"/>
      </g>
      <g class="g3" fill="rgba(104,125,156,.55)" font-family="DM Sans,sans-serif" font-size="9">
        <text x="210" y="323" text-anchor="middle">36,000 SF</text>
        <text x="413" y="174" text-anchor="middle" transform="rotate(90,413,174)">22,000 SF</text>
      </g>

      <!-- BIM coordination lines (MEP routing) -->
      <g class="g4" stroke="rgba(222,170,87,.25)" stroke-width=".8" stroke-dasharray="4 2" fill="none">
        <path d="M90 100 H160 V150 H90 Z"/>
        <path d="M200 80 H260 V120 H200 Z"/>
        <path d="M90 190 H150 V240 H90 Z"/>
      </g>

      <!-- Structural grid lines -->
      <line x1="60" y1="60" x2="360" y2="60" class="l1" stroke="rgba(104,125,156,.5)" stroke-width="1" fill="none"/>
      <line x1="60" y1="280" x2="360" y2="280" class="l2" stroke="rgba(104,125,156,.4)" stroke-width="1" fill="none"/>
      <line x1="60" y1="60" x2="60" y2="280" class="l3" stroke="rgba(104,125,156,.4)" stroke-width="1" fill="none"/>

      <!-- Column markers -->
      <g class="n1">
        <circle cx="60" cy="60" r="5" fill="rgba(104,125,156,.8)"/>
        <circle cx="180" cy="60" r="5" fill="rgba(104,125,156,.8)"/>
        <circle cx="280" cy="60" r="5" fill="rgba(104,125,156,.8)"/>
        <circle cx="360" cy="60" r="5" fill="rgba(104,125,156,.8)"/>
        <circle cx="60" cy="170" r="4" fill="rgba(104,125,156,.6)"/>
        <circle cx="180" cy="170" r="4" fill="rgba(104,125,156,.6)"/>
        <circle cx="280" cy="170" r="4" fill="rgba(104,125,156,.6)"/>
      </g>

      <!-- BIM discipline tags -->
      <g class="n2">
        <rect x="72" y="78" width="42" height="16" rx="3" fill="rgba(104,125,156,.15)" stroke="rgba(104,125,156,.3)" stroke-width=".5"/>
        <text x="93" y="89" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(104,125,156,.8)" font-weight="600">STRUCT</text>
        <rect x="192" y="78" width="36" height="16" rx="3" fill="rgba(222,170,87,.12)" stroke="rgba(222,170,87,.3)" stroke-width=".5"/>
        <text x="210" y="89" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(222,170,87,.9)" font-weight="600">MEP</text>
        <rect x="72" y="190" width="38" height="16" rx="3" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.25)" stroke-width=".5"/>
        <text x="91" y="201" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(104,125,156,.75)" font-weight="600">ARCH</text>
      </g>

      <!-- Clash detection dot -->
      <g class="n3">
        <circle cx="180" cy="170" r="10" fill="rgba(222,87,87,.12)" stroke="rgba(222,87,87,.4)" stroke-width="1.2" class="dot"/>
        <text x="180" y="174" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(222,87,87,.8)" font-weight="700">!</text>
        <rect x="190" y="158" width="58" height="16" rx="3" fill="rgba(17,24,39,.75)"/>
        <text x="219" y="169" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="white" font-weight="600">CLASH: 0</text>
      </g>

      <!-- Label -->
      <g style="animation:popUp .4s 3s ease both;opacity:0">
        <rect x="110" y="340" width="200" height="22" rx="3" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.2)" stroke-width=".5"/>
        <text x="210" y="355" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(104,125,156,.7)" font-weight="600" letter-spacing=".5">BIM COORDINATION MODEL</text>
      </g>
    </svg>