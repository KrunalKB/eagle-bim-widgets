<svg class="consult-svg" viewBox="0 0 420 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="cg"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="cg2"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <style>
        .cb{stroke:#687d9c;stroke-width:1.5;fill:rgba(104,125,156,.06);rx:4}
        .cl{stroke:#687d9c;stroke-width:1.2;fill:none;stroke-dasharray:4 3}
        .clt{stroke:#deaa57;stroke-width:1.5;fill:none}
        .ct{fill:#4a5568;font-family:monospace;font-size:8.5px}
        .ctb{fill:#1a2233;font-family:monospace;font-size:9px;font-weight:bold}
        .ctn{fill:#687d9c;font-family:monospace;font-size:8px}
        .cd{fill:#deaa57;filter:url(#cg2)}
        .cdb{fill:#687d9c;filter:url(#cg2)}
        @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .fl{animation:fl 5s ease-in-out infinite;transform-origin:210px 240px}
        @keyframes dash{to{stroke-dashoffset:-28}}
        .da{animation:dash 1.6s linear infinite}
        .da2{animation:dash 2.2s linear infinite}
        .da3{animation:dash 2.8s linear infinite}
        @keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
        .bk{animation:bk 2s ease-in-out infinite}
        .bk2{animation:bk 2s .8s ease-in-out infinite}
        .bk3{animation:bk 2s 1.6s ease-in-out infinite}
        @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
        .pop{animation:pop 3s ease-in-out infinite;transform-origin:center}
      </style>

      <!-- Background grid -->
      <defs><pattern id="cgrid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(104,125,156,.07)" stroke-width=".5"/></pattern></defs>
      <rect width="420" height="480" fill="url(#cgrid)"/>

      <g class="fl">

        <!-- Central strategy node -->
        <rect x="145" y="190" width="130" height="56" rx="6" fill="#687d9c" stroke="#687d9c" stroke-width="1.3"/>
        <text x="210" y="213" fill="white" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle" letter-spacing=".08em">BIM CONSULTING</text>
        <text x="210" y="228" fill="rgba(255,255,255,.7)" font-family="monospace" font-size="8" text-anchor="middle">Eagle BIM</text>
        <circle cx="210" cy="218" r="0" fill="none"/>

        <!-- Top node: BIM Strategy -->
        <rect x="148" y="76" width="124" height="44" rx="5" fill="rgba(104,125,156,.1)" stroke="#687d9c" stroke-width="1.3"/>
        <text x="210" y="96" fill="#1a2233" font-family="monospace" font-size="8.5" font-weight="bold" text-anchor="middle">BIM STRATEGY</text>
        <text x="210" y="110" fill="#687d9c" font-family="monospace" font-size="7.5" text-anchor="middle">Assessment + Roadmap</text>
        <line x1="210" y1="120" x2="210" y2="190" stroke="#687d9c" stroke-width="1.2" stroke-dasharray="4 3" class="da"/>
        <circle class="cd bk" cx="210" cy="120" r="3.5"/>
        <circle class="cd bk" cx="210" cy="190" r="3.5"/>

        <!-- Left node: BEP Development -->
        <rect x="28" y="186" width="100" height="44" rx="5" fill="rgba(222,170,87,.08)" stroke="#deaa57" stroke-width="1.2"/>
        <text x="78" y="205" fill="#1a2233" font-family="monospace" font-size="8.5" font-weight="bold" text-anchor="middle">BEP CREATION</text>
        <text x="78" y="219" fill="#c8943d" font-family="monospace" font-size="7.5" text-anchor="middle">Plans + Standards</text>
        <line x1="128" y1="208" x2="145" y2="208" stroke="#deaa57" stroke-width="1.3" stroke-dasharray="4 3" class="da2"/>
        <circle class="cd bk2" cx="128" cy="208" r="3" filter="url(#cg2)"/>

        <!-- Right node: Revit Templates -->
        <rect x="292" y="186" width="104" height="44" rx="5" fill="rgba(104,125,156,.1)" stroke="#687d9c" stroke-width="1.3"/>
        <text x="344" y="205" fill="#1a2233" font-family="monospace" font-size="8.5" font-weight="bold" text-anchor="middle">REVIT TEMPLATES</text>
        <text x="344" y="219" fill="#687d9c" font-family="monospace" font-size="7.5" text-anchor="middle">Standards + Libraries</text>
        <line x1="275" y1="208" x2="292" y2="208" stroke="#687d9c" stroke-width="1.2" stroke-dasharray="4 3" class="da"/>
        <circle class="cdb bk3" cx="275" cy="208" r="3" filter="url(#cg2)"/>

        <!-- Bottom left node: Workflow Optimization -->
        <rect x="36" y="306" width="112" height="44" rx="5" fill="rgba(104,125,156,.08)" stroke="#687d9c" stroke-width="1.2"/>
        <text x="92" y="325" fill="#1a2233" font-family="monospace" font-size="8.5" font-weight="bold" text-anchor="middle">WORKFLOW OPT.</text>
        <text x="92" y="339" fill="#687d9c" font-family="monospace" font-size="7.5" text-anchor="middle">Process Mapping</text>
        <line x1="145" y1="228" x2="148" y2="306" stroke="#687d9c" stroke-width="1.1" stroke-dasharray="4 3" class="da3"/>
        <circle class="cd bk" cx="146" cy="267" r="3" filter="url(#cg2)"/>

        <!-- Bottom right node: Team Training -->
        <rect x="268" y="306" width="112" height="44" rx="5" fill="rgba(222,170,87,.08)" stroke="#deaa57" stroke-width="1.2"/>
        <text x="324" y="325" fill="#1a2233" font-family="monospace" font-size="8.5" font-weight="bold" text-anchor="middle">TEAM TRAINING</text>
        <text x="324" y="339" fill="#c8943d" font-family="monospace" font-size="7.5" text-anchor="middle">Revit + Coordination</text>
        <line x1="275" y1="228" x2="272" y2="306" stroke="#deaa57" stroke-width="1.1" stroke-dasharray="4 3" class="da2"/>
        <circle class="cd bk2" cx="274" cy="267" r="3" filter="url(#cg2)"/>

        <!-- Bottom centre node: Technology Selection -->
        <rect x="148" y="310" width="124" height="44" rx="5" fill="rgba(104,125,156,.1)" stroke="#687d9c" stroke-width="1.3"/>
        <text x="210" y="329" fill="#1a2233" font-family="monospace" font-size="8.5" font-weight="bold" text-anchor="middle">TECH SELECTION</text>
        <text x="210" y="343" fill="#687d9c" font-family="monospace" font-size="7.5" text-anchor="middle">Software + Platforms</text>
        <line x1="210" y1="246" x2="210" y2="310" stroke="#687d9c" stroke-width="1.2" stroke-dasharray="4 3" class="da"/>
        <circle class="cd bk3" cx="210" cy="278" r="3.5" filter="url(#cg2)"/>

        <!-- Outcome indicators at bottom -->
        <rect x="60" y="396" width="88" height="28" rx="4" fill="rgba(222,170,87,.12)" stroke="rgba(222,170,87,.4)" stroke-width=".8"/>
        <text x="104" y="414" fill="#c8943d" font-family="monospace" font-size="8" font-weight="bold" text-anchor="middle">FEWER ERRORS</text>

        <rect x="166" y="396" width="88" height="28" rx="4" fill="rgba(104,125,156,.1)" stroke="rgba(104,125,156,.3)" stroke-width=".8"/>
        <text x="210" y="414" fill="#687d9c" font-family="monospace" font-size="8" font-weight="bold" text-anchor="middle">FASTER DELIVERY</text>

        <rect x="272" y="396" width="88" height="28" rx="4" fill="rgba(222,170,87,.12)" stroke="rgba(222,170,87,.4)" stroke-width=".8"/>
        <text x="316" y="414" fill="#c8943d" font-family="monospace" font-size="8" font-weight="bold" text-anchor="middle">BETTER QUALITY</text>

        <!-- Connector lines to outcomes -->
        <line x1="148" y1="354" x2="104" y2="396" stroke="rgba(104,125,156,.25)" stroke-width=".8"/>
        <line x1="210" y1="354" x2="210" y2="396" stroke="rgba(104,125,156,.25)" stroke-width=".8"/>
        <line x1="272" y1="354" x2="316" y2="396" stroke="rgba(104,125,156,.25)" stroke-width=".8"/>

        <!-- LOD badge top right -->
        <rect x="320" y="58" width="72" height="22" rx="3" fill="rgba(222,170,87,.15)" stroke="rgba(222,170,87,.4)" stroke-width=".8"/>
        <text x="356" y="73" fill="#c8943d" font-family="monospace" font-size="8" font-weight="bold" text-anchor="middle">ISO 19650</text>

        <!-- AIA badge top left -->
        <rect x="28" y="58" width="72" height="22" rx="3" fill="rgba(104,125,156,.12)" stroke="rgba(104,125,156,.3)" stroke-width=".8"/>
        <text x="64" y="73" fill="#687d9c" font-family="monospace" font-size="8" font-weight="bold" text-anchor="middle">AIA + BEP</text>

      </g>

      <!-- Scan line -->
      <rect x="0" y="0" width="420" height="1.5" fill="rgba(104,125,156,.15)">
        <animateTransform attributeName="transform" type="translate" from="0,60" to="0,440" dur="5s" repeatCount="indefinite"/>
      </rect>
    </svg>