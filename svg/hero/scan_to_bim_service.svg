<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
      <style>
        @keyframes dotIn{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
        @keyframes lineIn{from{stroke-dashoffset:500}to{stroke-dashoffset:0}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
        .d1{animation:dotIn .3s .05s ease both;opacity:0} .d2{animation:dotIn .3s .1s ease both;opacity:0}
        .d3{animation:dotIn .3s .15s ease both;opacity:0} .d4{animation:dotIn .3s .2s ease both;opacity:0}
        .d5{animation:dotIn .3s .25s ease both;opacity:0} .d6{animation:dotIn .3s .3s ease both;opacity:0}
        .d7{animation:dotIn .3s .35s ease both;opacity:0} .d8{animation:dotIn .3s .4s ease both;opacity:0}
        .d9{animation:dotIn .3s .45s ease both;opacity:0} .d10{animation:dotIn .3s .5s ease both;opacity:0}
        .d11{animation:dotIn .3s .55s ease both;opacity:0} .d12{animation:dotIn .3s .6s ease both;opacity:0}
        .d13{animation:dotIn .3s .65s ease both;opacity:0} .d14{animation:dotIn .3s .7s ease both;opacity:0}
        .d15{animation:dotIn .3s .75s ease both;opacity:0} .d16{animation:dotIn .3s .8s ease both;opacity:0}
        .d17{animation:dotIn .3s .85s ease both;opacity:0} .d18{animation:dotIn .3s .9s ease both;opacity:0}
        .d19{animation:dotIn .3s .95s ease both;opacity:0} .d20{animation:dotIn .3s 1.0s ease both;opacity:0}
        .d21{animation:dotIn .3s 1.05s ease both;opacity:0} .d22{animation:dotIn .3s 1.1s ease both;opacity:0}
        .d23{animation:dotIn .3s 1.15s ease both;opacity:0} .d24{animation:dotIn .3s 1.2s ease both;opacity:0}
        .d25{animation:dotIn .3s 1.25s ease both;opacity:0} .d26{animation:dotIn .3s 1.3s ease both;opacity:0}
        .d27{animation:dotIn .3s 1.35s ease both;opacity:0} .d28{animation:dotIn .3s 1.4s ease both;opacity:0}
        .d29{animation:dotIn .3s 1.45s ease both;opacity:0} .d30{animation:dotIn .3s 1.5s ease both;opacity:0}
        .w1{stroke-dasharray:500;stroke-dashoffset:500;animation:lineIn .7s 1.7s ease forwards}
        .w2{stroke-dasharray:400;stroke-dashoffset:400;animation:lineIn .6s 2.0s ease forwards}
        .w3{stroke-dasharray:300;stroke-dashoffset:300;animation:lineIn .5s 2.3s ease forwards}
        .w4{stroke-dasharray:200;stroke-dashoffset:200;animation:lineIn .4s 2.6s ease forwards}
        .lbl{animation:fadeIn .4s ease both;opacity:0}
        .l1{animation-delay:2.1s} .l2{animation-delay:2.4s} .l3{animation-delay:2.7s}
        .arr{animation:nudge 1.4s 1.9s ease-in-out infinite;transform-origin:210px 210px}
      </style>
      <defs>
        <pattern id="pcgrid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M20 0L0 0 0 20" fill="none" stroke="rgba(104,125,156,.06)" stroke-width=".5"/>
        </pattern>
      </defs>
      <rect width="420" height="420" fill="url(#pcgrid)"/>

      <!-- LEFT: point cloud panel -->
      <rect x="16" y="16" width="178" height="388" rx="6" fill="rgba(10,14,28,.94)" stroke="rgba(104,125,156,.22)" stroke-width="1"/>
      <text x="105" y="42" fill="rgba(80,190,255,.55)" font-family="monospace" font-size="8.5" text-anchor="middle" font-weight="bold" letter-spacing=".1em">POINT CLOUD</text>
      <line x1="16" y1="52" x2="194" y2="52" stroke="rgba(104,125,156,.15)" stroke-width=".7"/>

      <!-- Floor — blue -->
      <circle class="d1"  cx="34"  cy="345" r="2.2" fill="rgba(65,168,255,.88)"/>
      <circle class="d2"  cx="56"  cy="352" r="1.8" fill="rgba(50,152,245,.83)"/>
      <circle class="d3"  cx="78"  cy="346" r="2.4" fill="rgba(82,182,255,.91)"/>
      <circle class="d4"  cx="100" cy="354" r="1.9" fill="rgba(60,162,250,.86)"/>
      <circle class="d5"  cx="122" cy="348" r="2.1" fill="rgba(74,176,255,.89)"/>
      <circle class="d6"  cx="144" cy="355" r="1.7" fill="rgba(46,148,240,.81)"/>
      <circle class="d7"  cx="166" cy="347" r="2.3" fill="rgba(88,188,255,.9)"/>
      <circle class="d8"  cx="185" cy="352" r="1.8" fill="rgba(64,165,252,.85)"/>

      <!-- Back wall — gold -->
      <circle class="d9"  cx="40"  cy="70"  r="2.0" fill="rgba(255,172,55,.8)"/>
      <circle class="d10" cx="64"  cy="66"  r="1.7" fill="rgba(244,158,44,.76)"/>
      <circle class="d11" cx="88"  cy="72"  r="2.2" fill="rgba(255,178,62,.83)"/>
      <circle class="d12" cx="112" cy="68"  r="1.8" fill="rgba(249,163,52,.78)"/>
      <circle class="d13" cx="136" cy="73"  r="2.0" fill="rgba(255,172,55,.8)"/>
      <circle class="d14" cx="160" cy="67"  r="1.6" fill="rgba(239,155,42,.74)"/>
      <circle class="d15" cx="183" cy="71"  r="1.9" fill="rgba(255,180,65,.81)"/>

      <!-- Left wall — cyan/teal -->
      <circle class="d16" cx="26" cy="100" r="1.8" fill="rgba(44,210,186,.73)"/>
      <circle class="d17" cx="24" cy="135" r="2.0" fill="rgba(36,202,180,.76)"/>
      <circle class="d18" cx="27" cy="168" r="1.7" fill="rgba(50,216,190,.71)"/>
      <circle class="d19" cx="25" cy="202" r="2.1" fill="rgba(42,208,184,.74)"/>
      <circle class="d20" cx="26" cy="236" r="1.8" fill="rgba(48,213,188,.72)"/>
      <circle class="d21" cx="24" cy="270" r="2.0" fill="rgba(38,204,182,.75)"/>
      <circle class="d22" cx="27" cy="305" r="1.7" fill="rgba(54,218,192,.7)"/>

      <!-- Interior — green (MEP pipes) -->
      <circle class="d23" cx="62"  cy="152" r="1.5" fill="rgba(76,220,126,.63)"/>
      <circle class="d24" cx="94"  cy="146" r="1.8" fill="rgba(68,214,120,.66)"/>
      <circle class="d25" cx="126" cy="153" r="1.5" fill="rgba(82,224,130,.61)"/>
      <circle class="d26" cx="158" cy="148" r="1.7" fill="rgba(72,218,124,.64)"/>

      <!-- Interior scatter -->
      <circle class="d27" cx="75"  cy="262" r="1.5" fill="rgba(105,182,255,.5)"/>
      <circle class="d28" cx="110" cy="270" r="1.4" fill="rgba(95,176,252,.48)"/>
      <circle class="d29" cx="145" cy="264" r="1.6" fill="rgba(112,186,255,.52)"/>
      <circle class="d30" cx="178" cy="258" r="1.4" fill="rgba(100,180,254,.49)"/>

      <text x="105" y="376" fill="rgba(80,190,255,.35)" font-family="monospace" font-size="6.5" text-anchor="middle">E57 · 38M points · ±3mm</text>
      <text x="105" y="389" fill="rgba(104,125,156,.28)" font-family="monospace" font-size="6.5" text-anchor="middle">Leica RTC360 · 6 positions</text>

      <!-- ARROW -->
      <g class="arr">
        <rect x="195" y="200" width="30" height="22" rx="11" fill="rgba(222,170,87,.92)"/>
        <text x="210" y="216" fill="white" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">›</text>
      </g>

      <!-- RIGHT: Revit model panel -->
      <rect x="226" y="16" width="178" height="388" rx="6" fill="rgba(250,249,248,.97)" stroke="rgba(104,125,156,.2)" stroke-width="1"/>
      <text x="315" y="42" fill="rgba(74,96,128,.62)" font-family="monospace" font-size="8.5" text-anchor="middle" font-weight="bold" letter-spacing=".1em">REVIT MODEL</text>
      <line x1="226" y1="52" x2="404" y2="52" stroke="rgba(104,125,156,.15)" stroke-width=".7"/>

      <!-- Outer walls -->
      <rect class="w1" x="244" y="66" width="144" height="258" fill="rgba(104,125,156,.04)" stroke="rgba(26,34,51,.68)" stroke-width="2.5" stroke-dasharray="500"/>
      <!-- Internal walls -->
      <line class="w2" x1="244" y1="188" x2="388" y2="188" stroke="rgba(26,34,51,.55)" stroke-width="2"/>
      <line class="w2" x1="316" y1="188" x2="316" y2="324" stroke="rgba(26,34,51,.5)" stroke-width="1.8"/>
      <!-- Door gap + arc -->
      <line class="w3" x1="316" y1="222" x2="316" y2="266" stroke="rgba(250,249,248,.98)" stroke-width="5"/>
      <path class="w3" d="M316,222 Q340,222 340,246" fill="none" stroke="rgba(26,34,51,.36)" stroke-width="1.3" stroke-dasharray="300"/>
      <!-- Window -->
      <line class="w3" x1="258" y1="66" x2="296" y2="66" stroke="rgba(104,125,156,.78)" stroke-width="4.5" stroke-dasharray="300"/>
      <line class="w3" x1="258" y1="63" x2="258" y2="69" stroke="rgba(104,125,156,.55)" stroke-width="1"/>
      <line class="w3" x1="296" y1="63" x2="296" y2="69" stroke="rgba(104,125,156,.55)" stroke-width="1"/>
      <!-- MEP duct gold -->
      <rect class="w4" x="248" y="154" width="74" height="9" rx="1" fill="rgba(222,170,87,.1)" stroke="rgba(222,170,87,.62)" stroke-width="1.2" stroke-dasharray="200"/>
      <!-- Pipe teal -->
      <line class="w4" x1="248" y1="170" x2="384" y2="170" stroke="rgba(44,168,150,.62)" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="200"/>

      <!-- Room labels -->
      <text class="lbl l1" x="280" y="130" fill="rgba(74,96,128,.52)" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">OFFICE</text>
      <text class="lbl l2" x="354" y="258" fill="rgba(74,96,128,.48)" font-family="monospace" font-size="8.5" text-anchor="middle" font-weight="bold">STORE</text>
      <text class="lbl l3" x="280" y="258" fill="rgba(74,96,128,.45)" font-family="monospace" font-size="8" text-anchor="middle">CORRIDOR</text>

      <!-- Accuracy badge -->
      <g class="lbl l3">
        <rect x="238" y="338" width="152" height="50" rx="4" fill="rgba(104,125,156,.07)" stroke="rgba(104,125,156,.18)" stroke-width=".8"/>
        <text x="314" y="356" fill="rgba(74,96,128,.68)" font-family="monospace" font-size="8" text-anchor="middle" font-weight="bold">±5mm ACCURACY</text>
        <text x="314" y="369" fill="rgba(104,125,156,.45)" font-family="monospace" font-size="7" text-anchor="middle">LOD 300 · As Built BIM</text>
        <text x="314" y="382" fill="rgba(222,170,87,.58)" font-family="monospace" font-size="7" text-anchor="middle" font-weight="bold">EAGLE BIM</text>
      </g>
    </svg>